<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUp Admin - Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f9f9f9; color: #262626; line-height: 1.6; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .admin-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #262626; color: white; padding: 20px; flex-shrink: 0; }
        .sidebar h2 { font-size: 1.5rem; border-bottom: 1px solid #444; padding-bottom: 20px; }
        .sidebar nav a { display: block; color: #bbb; text-decoration: none; padding: 15px 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .sidebar nav a:hover, .sidebar nav a.active { color: white; font-weight: bold; border-left: 3px solid white; padding-left: 10px; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .admin-section { background: #fff; padding: 2rem; border: 1px solid #e5e5e5; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid #e5e5e5; font-family: inherit; transition: border-color 0.3s; }
        .form-control:focus { outline: none; border-color: #262626; }
        .btn { padding: 0.75rem 1.5rem; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.3s; letter-spacing: 0.1em; }
        .btn-primary { background-color: #262626; color: #fff; }
        .btn-primary:hover { background-color: #404040; transform: translateY(-1px); }
        .btn-secondary { background-color: #fff; color: #262626; border: 1px solid #262626; }
        .btn-secondary:hover { background-color: #f5f5f5; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 150px; }
        .filter-group label { font-size: 0.7rem; margin-bottom: 0.25rem; }
        .filter-group input, .filter-group select { width: 100%; padding: 0.5rem; border: 1px solid #e5e5e5; }
        .sort-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
        .sort-select { padding: 0.5rem; border: 1px solid #e5e5e5; background: white; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #e5e5e5; }
        .data-table th { font-size: 1rem; border-bottom: 2px solid #262626; background-color: #fafafa; }
        .action-btns { display: flex; gap: 0.5rem; }
        .btn-table { padding: 0.4rem 0.8rem; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; transition: all 0.2s; }
        .btn-edit:hover { background: #262626; color: #fff; }
        .btn-remove:hover { background: #e74c3c; color: #fff; }
        .export-btn { background-color: #27ae60; color: white; border: none; }
        .export-btn:hover { background-color: #2ecc71; }
        @media (max-width: 768px) { .filter-group { min-width: 100%; } }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <aside class="sidebar">
        <h2>StepUp Admin</h2>
        <nav>
            <a href="admin.html">Staff Management</a>
            <a href="Inventory.html" class="active">Inventory Management</a>
            <a href="User.html">User Records</a>
            <a href="Order.html">Order Fulfillment</a>
            <a href="Sales.html">Sales Reports</a>
            <hr style="margin: 20px 0; border-color: #444;">
            <a href="#" onclick="logoutAdmin(); return false;" style="color: #e74c3c;">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <h1>Inventory Management</h1>
        <div class="admin-section">
            <h2>Shoe Item Management</h2>
            
            <!-- Add Product Form -->
            <form id="shoeForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <div class="form-group"><label>Product Name *</label><input type="text" id="sName" class="form-control" required></div>
                <div class="form-group"><label>Brand *</label><input type="text" id="sBrand" class="form-control" required></div>
                <div class="form-group"><label>Model Name *</label><input type="text" id="sModel" class="form-control" required></div>
                <div class="form-group"><label>Size Range *</label><input type="text" id="sSize" class="form-control" required></div>
                <div class="form-group"><label>Price ($) *</label><input type="number" id="sPrice" step="0.01" class="form-control" required></div>
                <div class="form-group"><label>Stock Level *</label><input type="number" id="sStock" class="form-control" required></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="sImage" class="form-control" placeholder="https://..."></div>
                <div class="form-group"><label>Tag (optional)</label><input type="text" id="sTag" class="form-control" placeholder="NEW, FEATURED, SALE"></div>
                <div class="form-group" style="display: flex; align-items: flex-end;"><button type="submit" class="btn btn-primary" style="width: 100%;">Add Product</button></div>
            </form>

            <!-- Filter & Export Section -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Search (Name/Brand)</label>
                    <input type="text" id="searchInput" placeholder="Search...">
                </div>
                <div class="filter-group">
                    <label>Brand</label>
                    <select id="brandFilter">
                        <option value="">All Brands</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Size Range</label>
                    <input type="text" id="sizeFilter" placeholder="e.g., 7-13">
                </div>
                <div class="filter-group">
                    <label>Price Min ($)</label>
                    <input type="number" id="priceMin" step="0.01" placeholder="Min">
                </div>
                <div class="filter-group">
                    <label>Price Max ($)</label>
                    <input type="number" id="priceMax" step="0.01" placeholder="Max">
                </div>
                <div class="filter-group">
                    <label>Stock Min</label>
                    <input type="number" id="stockMin" placeholder="Min">
                </div>
                <div class="filter-group">
                    <label>Stock Max</label>
                    <input type="number" id="stockMax" placeholder="Max">
                </div>
                <div class="filter-group">
                    <button class="btn btn-secondary" onclick="applyFilters()">Apply Filters</button>
                </div>
            </div>

            <div class="sort-bar">
                <div>
                    <label>Sort by: </label>
                    <select id="sortSelect" class="sort-select" onchange="applySorting()">
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                        <option value="stock-asc">Stock (Low to High)</option>
                        <option value="stock-desc">Stock (High to Low)</option>
                    </select>
                </div>
                <div>
                    <button class="btn export-btn" onclick="exportToExcel()">📊 Export to Excel</button>
                </div>
            </div>

            <table class="data-table">
                <thead>
                    <th>Name</th><th>Brand</th><th>Model</th><th>Sizes</th><th>Price</th><th>Stock</th><th>Actions</th>
                </thead>
                <tbody id="shoeTableBody"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'admin-login.html';

    async function verifyToken() {
        try {
            const res = await fetch('/api/admin/verify', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error();
        } catch (err) {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        }
    }
    verifyToken();

    function logoutAdmin() { localStorage.removeItem('adminToken'); window.location.href = 'admin-login.html'; }

    let allProducts = [];
    let filteredProducts = [];
    let editingProductId = null;

    // Load products from server
    async function loadProducts() {
        try {
            const res = await fetch('/api/admin/inventory/products', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            allProducts = data.data;
            populateBrandFilter();
            applyFilters(); // initial render
        } catch (err) { console.error(err); alert('Failed to load products'); }
    }

    // Populate brand dropdown with unique brands from products
    function populateBrandFilter() {
        const brands = [...new Set(allProducts.map(p => p.brand))].sort();
        const brandSelect = document.getElementById('brandFilter');
        brandSelect.innerHTML = '<option value="">All Brands</option>';
        brands.forEach(brand => {
            brandSelect.innerHTML += `<option value="${escapeHtml(brand)}">${escapeHtml(brand)}</option>`;
        });
    }

    // Apply filters from UI
    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const brand = document.getElementById('brandFilter').value;
        const sizeRange = document.getElementById('sizeFilter').value.toLowerCase();
        const priceMin = parseFloat(document.getElementById('priceMin').value);
        const priceMax = parseFloat(document.getElementById('priceMax').value);
        const stockMin = parseInt(document.getElementById('stockMin').value);
        const stockMax = parseInt(document.getElementById('stockMax').value);

        filteredProducts = allProducts.filter(p => {
            // Search
            if (searchTerm && !p.name.toLowerCase().includes(searchTerm) && !p.brand.toLowerCase().includes(searchTerm)) return false;
            // Brand
            if (brand && p.brand !== brand) return false;
            // Size range (simple substring match)
            if (sizeRange && !p.sizeRange.toLowerCase().includes(sizeRange)) return false;
            // Price
            if (!isNaN(priceMin) && p.price < priceMin) return false;
            if (!isNaN(priceMax) && p.price > priceMax) return false;
            // Stock
            if (!isNaN(stockMin) && p.stock < stockMin) return false;
            if (!isNaN(stockMax) && p.stock > stockMax) return false;
            return true;
        });
        applySorting();
    }

    function applySorting() {
        const sortBy = document.getElementById('sortSelect').value;
        if (sortBy === 'name-asc') filteredProducts.sort((a,b) => a.name.localeCompare(b.name));
        else if (sortBy === 'name-desc') filteredProducts.sort((a,b) => b.name.localeCompare(a.name));
        else if (sortBy === 'price-asc') filteredProducts.sort((a,b) => a.price - b.price);
        else if (sortBy === 'price-desc') filteredProducts.sort((a,b) => b.price - a.price);
        else if (sortBy === 'stock-asc') filteredProducts.sort((a,b) => a.stock - b.stock);
        else if (sortBy === 'stock-desc') filteredProducts.sort((a,b) => b.stock - a.stock);
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('shoeTableBody');
        tbody.innerHTML = '';
        if (filteredProducts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No products found</td></tr>';
            return;
        }
        filteredProducts.forEach(prod => {
            const row = tbody.insertRow();
            row.setAttribute('data-id', prod._id);
            row.innerHTML = `
                <td>${escapeHtml(prod.name)}</td>
                <td>${escapeHtml(prod.brand)}</td>
                <td>${escapeHtml(prod.model)}</td>
                <td>${escapeHtml(prod.sizeRange)}</td>
                <td>$${prod.price.toFixed(2)}</td>
                <td>${prod.stock}</td>
                <td>
                    <div class="action-btns">
                        <button class="btn-table btn-edit" onclick="editProduct('${prod._id}')">Edit</button>
                        <button class="btn-table btn-remove" onclick="removeProduct('${prod._id}')">Remove</button>
                    </div>
                </td>
            `;
        });
    }

    // Export to CSV (Excel compatible)
    function exportToExcel() {
        if (filteredProducts.length === 0) {
            alert('No data to export');
            return;
        }
        // Prepare headers and rows
        const headers = ['Name', 'Brand', 'Model', 'Size Range', 'Price (MOP)', 'Stock', 'Tag'];
        const rows = filteredProducts.map(p => [
            p.name, p.brand, p.model, p.sizeRange, p.price, p.stock, p.tag || ''
        ]);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' }); // BOM for UTF-8
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', 'inventory_export.csv');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    window.editProduct = async function(id) {
        try {
            const res = await fetch(`/api/admin/inventory/products/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            const p = data.product;
            document.getElementById('sName').value = p.name;
            document.getElementById('sBrand').value = p.brand;
            document.getElementById('sModel').value = p.model;
            document.getElementById('sSize').value = p.sizeRange;
            document.getElementById('sPrice').value = p.price;
            document.getElementById('sStock').value = p.stock;
            document.getElementById('sImage').value = p.image || '';
            document.getElementById('sTag').value = p.tag || '';
            editingProductId = id;
            document.querySelector('#shoeForm button[type="submit"]').textContent = 'Update Product';
        } catch (err) { alert(err.message); }
    };

    window.removeProduct = async function(id) {
        if (!confirm('Remove this product?')) return;
        try {
            const res = await fetch(`/api/admin/inventory/products/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error((await res.json()).error);
            loadProducts();
        } catch (err) { alert(err.message); }
    };

    document.getElementById('shoeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const productData = {
            name: document.getElementById('sName').value.trim(),
            brand: document.getElementById('sBrand').value.trim(),
            model: document.getElementById('sModel').value.trim(),
            sizeRange: document.getElementById('sSize').value.trim(),
            price: parseFloat(document.getElementById('sPrice').value),
            stock: parseInt(document.getElementById('sStock').value),
            image: document.getElementById('sImage').value.trim(),
            tag: document.getElementById('sTag').value.trim()
        };
        if (!productData.name || !productData.brand || !productData.model || !productData.sizeRange || isNaN(productData.price) || isNaN(productData.stock)) {
            alert('Please fill all required fields correctly');
            return;
        }
        try {
            let response;
            if (editingProductId) {
                response = await fetch(`/api/admin/inventory/products/${editingProductId}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(productData)
                });
                if (response.ok) {
                    editingProductId = null;
                    document.querySelector('#shoeForm button[type="submit"]').textContent = 'Add Product';
                }
            } else {
                response = await fetch('/api/admin/inventory/products', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(productData)
                });
            }
            if (!response.ok) throw new Error((await response.json()).error);
            document.getElementById('shoeForm').reset();
            loadProducts();
        } catch (err) { alert(err.message); }
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        loadProducts();
        // Add event listeners for filter inputs to auto-apply on change? We'll use the button.
        // For convenience, also add Enter key on search input
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') applyFilters(); });
    });
</script>
</body>
</html>
