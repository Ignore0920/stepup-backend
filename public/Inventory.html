<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUp Admin - Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f9f9f9; color: #262626; line-height: 1.6; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .admin-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #262626; color: white; padding: 20px; flex-shrink: 0; }
        .sidebar h2 { font-size: 1.5rem; border-bottom: 1px solid #444; padding-bottom: 20px; }
        .sidebar nav a { display: block; color: #bbb; text-decoration: none; padding: 15px 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .sidebar nav a:hover, .sidebar nav a.active { color: white; font-weight: bold; border-left: 3px solid white; padding-left: 10px; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .admin-section { background: #fff; padding: 2rem; border: 1px solid #e5e5e5; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid #e5e5e5; font-family: inherit; transition: border-color 0.3s; }
        .form-control:focus { outline: none; border-color: #262626; }
        .btn { padding: 0.75rem 2rem; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.3s; letter-spacing: 0.1em; }
        .btn-primary { background-color: #262626; color: #fff; }
        .btn-primary:hover { background-color: #404040; transform: translateY(-1px); }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #e5e5e5; }
        .data-table th { font-size: 1.1rem; border-bottom: 2px solid #262626; }
        .action-btns { display: flex; gap: 0.5rem; }
        .btn-table { padding: 0.4rem 0.8rem; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; transition: all 0.2s; }
        .btn-edit:hover { background: #262626; color: #fff; }
        .btn-remove:hover { background: #e74c3c; color: #fff; }
        h1 { margin-bottom: 2rem; font-size: 2.5rem; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <aside class="sidebar">
        <h2>StepUp Admin</h2>
        <nav>
            <a href="admin.html">Staff Management</a>
            <a href="Inventory.html" class="active">Inventory Management</a>
            <a href="User.html">User Records</a>
            <a href="Order.html">Order Fulfillment</a>
            <a href="Sales.html">Sales Reports</a>
            <hr style="margin: 20px 0; border-color: #444;">
            <a href="#" onclick="logoutAdmin(); return false;" style="color: #e74c3c;">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <h1>Inventory Management</h1>
        <div class="admin-section">
            <h2>Shoe Item Management</h2>
            <form id="shoeForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group"><label>Product Name *</label><input type="text" id="sName" class="form-control" required></div>
                <div class="form-group"><label>Brand *</label><input type="text" id="sBrand" class="form-control" required></div>
                <div class="form-group"><label>Model Name *</label><input type="text" id="sModel" class="form-control" required></div>
                <div class="form-group"><label>Size Range *</label><input type="text" id="sSize" class="form-control" required></div>
                <div class="form-group"><label>Price ($) *</label><input type="number" id="sPrice" step="0.01" class="form-control" required></div>
                <div class="form-group"><label>Stock Level *</label><input type="number" id="sStock" class="form-control" required></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="sImage" class="form-control" placeholder="https://..."></div>
                <div class="form-group"><label>Tag (optional)</label><input type="text" id="sTag" class="form-control" placeholder="NEW, FEATURED, SALE"></div>
                <div class="form-group" style="display: flex; align-items: flex-end;"><button type="submit" class="btn btn-primary" style="width: 100%;">Add Product</button></div>
            </form>
            <table class="data-table">
                <thead><th>Name</th><th>Brand</th><th>Model</th><th>Sizes</th><th>Price</th><th>Stock</th><th>Actions</th></thead>
                <tbody id="shoeTableBody"></tbody>
             </table>
        </div>
    </main>
</div>

<script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'admin-login.html';

    async function verifyToken() {
        try {
            const res = await fetch('/api/admin/verify', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error();
        } catch (err) {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        }
    }
    verifyToken();

    function logoutAdmin() { localStorage.removeItem('adminToken'); window.location.href = 'admin-login.html'; }

    // ========== Products ==========
    let editingProductId = null;

    async function loadProducts() {
        try {
            const res = await fetch('/api/admin/inventory/products', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            const tbody = document.getElementById('shoeTableBody');
            tbody.innerHTML = '';
            data.data.forEach(prod => {
                const row = tbody.insertRow();
                row.setAttribute('data-id', prod._id);
                row.innerHTML = `
                      <td>${escapeHtml(prod.name)}</td>
                      <td>${escapeHtml(prod.brand)}</td>
                      <td>${escapeHtml(prod.model)}</td>
                      <td>${escapeHtml(prod.sizeRange)}</td>
                      <td>$${prod.price.toFixed(2)}</td>
                      <td>${prod.stock}</td>
                      <td>
                        <div class="action-btns">
                            <button class="btn-table btn-edit" onclick="editProduct('${prod._id}')">Edit</button>
                            <button class="btn-table btn-remove" onclick="removeProduct('${prod._id}')">Remove</button>
                        </div>
                      </td>
                `;
            });
        } catch (err) { console.error(err); alert('Failed to load products'); }
    }

    window.editProduct = async function(id) {
        try {
            const res = await fetch(`/api/admin/inventory/products/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            const p = data.product;
            document.getElementById('sName').value = p.name;
            document.getElementById('sBrand').value = p.brand;
            document.getElementById('sModel').value = p.model;
            document.getElementById('sSize').value = p.sizeRange;
            document.getElementById('sPrice').value = p.price;
            document.getElementById('sStock').value = p.stock;
            document.getElementById('sImage').value = p.image || '';
            document.getElementById('sTag').value = p.tag || '';
            editingProductId = id;
            document.querySelector('#shoeForm button[type="submit"]').textContent = 'Update Product';
        } catch (err) { alert(err.message); }
    };

    window.removeProduct = async function(id) {
        if (!confirm('Remove this product?')) return;
        try {
            const res = await fetch(`/api/admin/inventory/products/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error((await res.json()).error);
            loadProducts();
        } catch (err) { alert(err.message); }
    };

    document.getElementById('shoeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const productData = {
            name: document.getElementById('sName').value.trim(),
            brand: document.getElementById('sBrand').value.trim(),
            model: document.getElementById('sModel').value.trim(),
            sizeRange: document.getElementById('sSize').value.trim(),
            price: parseFloat(document.getElementById('sPrice').value),
            stock: parseInt(document.getElementById('sStock').value),
            image: document.getElementById('sImage').value.trim(),
            tag: document.getElementById('sTag').value.trim()
        };
        if (!productData.name || !productData.brand || !productData.model || !productData.sizeRange || isNaN(productData.price) || isNaN(productData.stock)) {
            alert('Please fill all required fields correctly');
            return;
        }
        try {
            let response;
            if (editingProductId) {
                response = await fetch(`/api/admin/inventory/products/${editingProductId}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(productData)
                });
                if (response.ok) {
                    editingProductId = null;
                    document.querySelector('#shoeForm button[type="submit"]').textContent = 'Add Product';
                }
            } else {
                response = await fetch('/api/admin/inventory/products', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(productData)
                });
            }
            if (!response.ok) throw new Error((await response.json()).error);
            document.getElementById('shoeForm').reset();
            loadProducts();
        } catch (err) { alert(err.message); }
    });

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // Wait for DOM to be fully loaded before initializing
    document.addEventListener('DOMContentLoaded', () => {
        loadProducts();
    });
</script>
</body>
</html>
