<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUp Admin - Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f9f9f9; color: #262626; line-height: 1.6; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .admin-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #262626; color: white; padding: 20px; flex-shrink: 0; }
        .sidebar h2 { font-size: 1.5rem; border-bottom: 1px solid #444; padding-bottom: 20px; }
        .sidebar nav a { display: block; color: #bbb; text-decoration: none; padding: 15px 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .sidebar nav a:hover, .sidebar nav a.active { color: white; font-weight: bold; border-left: 3px solid white; padding-left: 10px; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .admin-section { background: #fff; padding: 2rem; border: 1px solid #e5e5e5; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid #e5e5e5; font-family: inherit; transition: border-color 0.3s; }
        .form-control:focus { outline: none; border-color: #262626; }
        .btn { padding: 0.75rem 1.5rem; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.3s; letter-spacing: 0.1em; }
        .btn-primary { background-color: #262626; color: #fff; }
        .btn-primary:hover { background-color: #404040; transform: translateY(-1px); }
        .btn-secondary { background-color: #fff; color: #262626; border: 1px solid #262626; }
        .btn-secondary:hover { background-color: #f5f5f5; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; align-items: flex-end; background: #f9f9f9; padding: 1rem; border: 1px solid #e5e5e5; }
        .filter-group { flex: 1; min-width: 150px; }
        .filter-group label { font-size: 0.7rem; margin-bottom: 0.25rem; display: block; }
        .filter-group input, .filter-group select { width: 100%; padding: 0.5rem; border: 1px solid #e5e5e5; }
        .sort-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
        .sort-select { padding: 0.5rem; border: 1px solid #e5e5e5; background: white; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #e5e5e5; }
        .data-table th { font-size: 1rem; border-bottom: 2px solid #262626; background-color: #fafafa; }
        .action-btns { display: flex; gap: 0.5rem; }
        .btn-table { padding: 0.4rem 0.8rem; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; transition: all 0.2s; }
        .btn-edit:hover { background: #262626; color: #fff; }
        .btn-remove:hover { background: #e74c3c; color: #fff; }
        .export-btn { background-color: #27ae60; color: white; border: none; }
        .export-btn:hover { background-color: #2ecc71; }
        .import-label { background: #262626; color: white; cursor: pointer; display: inline-block; margin: 0; }
        .import-label:hover { background: #404040; }

        /* 低库存行高亮样式 */
        .low-stock-row {
            background-color: #ffebee !important;
            border-left: 4px solid #e74c3c;
            font-weight: 600;
        }
        .low-stock-row td {
            color: #c0392b;
        }

        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border-radius: 8px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }
        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        .close-modal:hover { color: #262626; }
        .modal-footer {
            margin-top: 1.5rem;
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        .btn-cancel {
            background: #eee;
            color: #666;
            border: none;
            padding: 0.8rem 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-cancel:hover { background: #ddd; }
        .btn-save {
            background: #262626;
            color: #fff;
            border: none;
            padding: 0.8rem 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-save:hover { background: #404040; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <aside class="sidebar">
        <h2>StepUp Admin</h2>
        <nav>
    <a href="admin.html">STAFF MANAGEMENT</a>
    <a href="Inventory.html" class="active">INVENTORY MANAGEMENT</a>
    <a href="User.html">USER MANAGEMENT</a>
    <a href="Order.html">ORDER MANAGEMENT</a>
    <a href="dashboard.html">DASHBOARD</a>
    <hr style="margin: 20px 0; border-color: #444;">
    <a href="#" onclick="logoutAdmin(); return false;" style="color: #e74c3c;">Logout</a>
</nav>
    </aside>
    <main class="main-content">
        <h1>Inventory Management</h1>
        <div class="admin-section">
            <h2>Filter & Sort Products</h2>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Search (Name/Brand)</label>
                    <input type="text" id="searchInput" placeholder="Search...">
                </div>
                <div class="filter-group">
                    <label>Brand</label>
                    <select id="brandFilter">
                        <option value="">All Brands</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Size Range (EU)</label>
                    <input type="text" id="sizeFilter" placeholder="e.g., 35-45">
                </div>
                <div class="filter-group">
                    <label>Price Min ($)</label>
                    <input type="number" id="priceMin" step="0.01" placeholder="Min">
                </div>
                <div class="filter-group">
                    <label>Price Max ($)</label>
                    <input type="number" id="priceMax" step="0.01" placeholder="Max">
                </div>
                <div class="filter-group">
                    <label>Stock Min</label>
                    <input type="number" id="stockMin" placeholder="Min">
                </div>
                <div class="filter-group">
                    <label>Stock Max</label>
                    <input type="number" id="stockMax" placeholder="Max">
                </div>
                <div class="filter-group">
                    <button class="btn btn-secondary" onclick="applyFilters()">Apply Filters</button>
                </div>
            </div>

            <!-- Sort and Export + Import + Add New Product -->
            <div class="sort-bar">
                <div>
                    <label>Sort by: </label>
                    <select id="sortSelect" class="sort-select" onchange="applySorting()">
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                        <option value="stock-asc">Stock (Low to High)</option>
                        <option value="stock-desc">Stock (High to Low)</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn export-btn" onclick="exportToExcel()">📊 Export to Excel</button>
                    <label class="btn btn-primary import-label" style="display: inline-block; cursor: pointer;" onclick="showImportFormatAndSelectFile()">
                        📤 Import Products
                    </label>
                    <input type="file" id="importFileInput" accept=".csv,.xlsx,.xls" style="display: none;" />
                    <button class="btn btn-primary" onclick="openAddProductModal()">➕ Add New Product</button>
                </div>
            </div>

            <!-- Product Table -->
            <table class="data-table">
                <thead>
                    <th>Name</th><th>Brand</th><th>Model</th><th>Sizes</th><th>Price</th><th>Stock</th><th>Actions</th>
                </thead>
                <tbody id="shoeTableBody"></tbody>
             </table>
        </div>
    </main>
</div>

<!-- 产品编辑/新增模态框 -->
<div id="productModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeProductModal()">&times;</span>
        <div class="modal-header">
            <h3 id="modalTitle">Add New Product</h3>
        </div>
        <form id="productForm">
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="modalName" pattern="[A-Za-z0-9\s\-']{2,100}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Brand *</label>
                <input type="text" id="modalBrand" pattern="[A-Za-z0-9\s\-']{2,50}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Model Name *</label>
                <input type="text" id="modalModel" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Size Range *</label>
                <input type="text" id="modalSizeRange" class="form-control" placeholder="e.g., 35-45" required>
            </div>
            <div class="form-group">
    <label>Price ($) *</label>
    <input type="number" id="modalPrice" step="0.01" min="0" class="form-control" required>
</div>
<div class="form-group">
    <label>Stock Level *</label>
    <input type="number" id="modalStock" step="1" min="0" class="form-control" required>
</div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" id="modalImage" class="form-control" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Tag (optional)</label>
                <input type="text" id="modalTag" class="form-control" placeholder="NEW, FEATURED, SALE">
            </div>
            <div class="form-group">
                <label>Collection</label>
                <input type="text" id="modalCollection" class="form-control" placeholder="Casual, Running, etc." value="Casual">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="modalDescription" class="form-control" rows="2" placeholder="Product description..."></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeProductModal()">Cancel</button>
                <button type="submit" class="btn-save">Save Product</button>
            </div>
        </form>
    </div>
</div>

<script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'admin-login.html';

    async function verifyToken() {
        try {
            const res = await fetch('/api/admin/verify', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error();
        } catch (err) {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        }
    }
    verifyToken();

    function logoutAdmin() { localStorage.removeItem('adminToken'); window.location.href = 'admin-login.html'; }

    let allProducts = [];
    let filteredProducts = [];
    let editingProductId = null;

    // ---------- 模态框控制 ----------
    function openAddProductModal() {
        editingProductId = null;
        document.getElementById('modalTitle').innerText = 'Add New Product';
        document.getElementById('productForm').reset();
        document.getElementById('modalCollection').value = 'Casual';
        document.getElementById('modalDescription').value = '';
        document.getElementById('productModal').style.display = 'flex';
    }

    function closeProductModal() {
        document.getElementById('productModal').style.display = 'none';
        editingProductId = null;
    }

    async function openEditModal(productId) {
        try {
            const res = await fetch(`/api/admin/inventory/products/${productId}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            const p = data.product;
            
            editingProductId = productId;
            document.getElementById('modalTitle').innerText = 'Edit Product';
            document.getElementById('modalName').value = p.name || '';
            document.getElementById('modalBrand').value = p.brand || '';
            document.getElementById('modalModel').value = p.model || '';
            document.getElementById('modalSizeRange').value = p.sizeRange || '';
            document.getElementById('modalPrice').value = p.price || '';
            document.getElementById('modalStock').value = p.stock || '';
            document.getElementById('modalImage').value = p.image || '';
            document.getElementById('modalTag').value = p.tag || '';
            document.getElementById('modalCollection').value = p.collection || 'Casual';
            document.getElementById('modalDescription').value = p.description || '';
            
            document.getElementById('productModal').style.display = 'flex';
        } catch (err) { alert(err.message); }
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const productData = {
            name: document.getElementById('modalName').value.trim(),
            brand: document.getElementById('modalBrand').value.trim(),
            model: document.getElementById('modalModel').value.trim(),
            sizeRange: document.getElementById('modalSizeRange').value.trim(),
            price: parseFloat(document.getElementById('modalPrice').value),
            stock: parseInt(document.getElementById('modalStock').value),
            image: document.getElementById('modalImage').value.trim(),
            tag: document.getElementById('modalTag').value.trim(),
            collection: document.getElementById('modalCollection').value.trim() || 'Casual',
            description: document.getElementById('modalDescription').value.trim() || 'Premium athletic footwear with exceptional comfort and style.'
        };

        if (!productData.name || !productData.brand || !productData.model || !productData.sizeRange || isNaN(productData.price) || isNaN(productData.stock)) {
            alert('Please fill all required fields correctly');
            return;
        }

        try {
            let response;
            if (editingProductId) {
                response = await fetch(`/api/admin/inventory/products/${editingProductId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(productData)
                });
            } else {
                response = await fetch('/api/admin/inventory/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(productData)
                });
            }
            
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Save failed');
            
            alert(editingProductId ? 'Product updated successfully!' : 'Product added successfully!');
            closeProductModal();
            await loadProducts();
        } catch (err) {
            alert(err.message);
        }
    });

    async function loadProducts() {
        try {
            const res = await fetch('/api/admin/inventory/products', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            allProducts = data.data;
            populateBrandFilter();
            applyFilters();
        } catch (err) { console.error(err); alert('Failed to load products'); }
    }

    function populateBrandFilter() {
        const brands = [...new Set(allProducts.map(p => p.brand))].sort();
        const brandSelect = document.getElementById('brandFilter');
        brandSelect.innerHTML = '<option value="">All Brands</option>';
        brands.forEach(brand => {
            brandSelect.innerHTML += `<option value="${escapeHtml(brand)}">${escapeHtml(brand)}</option>`;
        });
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const brand = document.getElementById('brandFilter').value;
        const sizeRange = document.getElementById('sizeFilter').value.toLowerCase();
        const priceMin = parseFloat(document.getElementById('priceMin').value);
        const priceMax = parseFloat(document.getElementById('priceMax').value);
        const stockMin = parseInt(document.getElementById('stockMin').value);
        const stockMax = parseInt(document.getElementById('stockMax').value);

        filteredProducts = allProducts.filter(p => {
            if (searchTerm && !p.name.toLowerCase().includes(searchTerm) && !p.brand.toLowerCase().includes(searchTerm)) return false;
            if (brand && p.brand !== brand) return false;
            if (sizeRange && !p.sizeRange.toLowerCase().includes(sizeRange)) return false;
            if (!isNaN(priceMin) && p.price < priceMin) return false;
            if (!isNaN(priceMax) && p.price > priceMax) return false;
            if (!isNaN(stockMin) && p.stock < stockMin) return false;
            if (!isNaN(stockMax) && p.stock > stockMax) return false;
            return true;
        });
        applySorting();
    }

    function applySorting() {
        const sortBy = document.getElementById('sortSelect').value;
        if (sortBy === 'name-asc') filteredProducts.sort((a,b) => a.name.localeCompare(b.name));
        else if (sortBy === 'name-desc') filteredProducts.sort((a,b) => b.name.localeCompare(a.name));
        else if (sortBy === 'price-asc') filteredProducts.sort((a,b) => a.price - b.price);
        else if (sortBy === 'price-desc') filteredProducts.sort((a,b) => b.price - a.price);
        else if (sortBy === 'stock-asc') filteredProducts.sort((a,b) => a.stock - b.stock);
        else if (sortBy === 'stock-desc') filteredProducts.sort((a,b) => b.stock - a.stock);
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('shoeTableBody');
        if (filteredProducts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No products found</td></tr>';
            return;
        }

        // 排序：库存 < 5 的排前面，其余保持原顺序
        const sorted = [...filteredProducts].sort((a, b) => {
            if (a.stock < 5 && b.stock >= 5) return -1;
            if (a.stock >= 5 && b.stock < 5) return 1;
            return 0;
        });

        tbody.innerHTML = sorted.map(prod => {
            const isLowStock = prod.stock < 5;
            const rowClass = isLowStock ? 'low-stock-row' : '';
            return `
                <tr class="${rowClass}" data-id="${prod._id}">
                    <td>${escapeHtml(prod.name)}</td>
                    <td>${escapeHtml(prod.brand)}</td>
                    <td>${escapeHtml(prod.model)}</td>
                    <td>${escapeHtml(prod.sizeRange)}</td>
                    <td>$${prod.price.toFixed(2)}</td>
                    <td>${prod.stock}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-table btn-edit" onclick="openEditModal('${prod._id}')">Edit</button>
                            <button class="btn-table btn-remove" onclick="removeProduct('${prod._id}')">Remove</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    window.removeProduct = async function(id) {
        if (!confirm('Remove this product?')) return;
        try {
            const res = await fetch(`/api/admin/inventory/products/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error((await res.json()).error);
            loadProducts();
        } catch (err) { alert(err.message); }
    };

    function exportToExcel() {
        if (filteredProducts.length === 0) {
            alert('No data to export');
            return;
        }
        const headers = ['Name', 'Brand', 'Model', 'Size Range', 'Price (MOP)', 'Stock', 'Tag'];
        const rows = filteredProducts.map(p => [p.name, p.brand, p.model, p.sizeRange, p.price, p.stock, p.tag || '']);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', 'inventory_export.csv');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    function showImportFormatAndSelectFile() {
        const formatMessage = `📋 IMPORT FILE FORMAT REQUIREMENTS

✅ REQUIRED COLUMNS (must be present):
   • name         – Product name
   • brand        – Brand name
   • model        – Model identifier
   • sizeRange    – e.g., 35-45 or 35,36,37
   • price        – Numeric (e.g., 189.99)
   • stock        – Integer (e.g., 45)

🟡 OPTIONAL COLUMNS:
   • image        – URL to product image
   • tag          – e.g., FEATURED, NEW, SALE
   • collection   – e.g., Casual, Running
   • description  – Product description

⚠️ IMPORTANT NOTES:
   • File must be CSV, XLSX, or XLS.
   • First row must be the header with exact column names (case-insensitive).
   • If a product with the same name, brand, and model already exists, it will be UPDATED instead of duplicated.
   • Empty rows will be skipped.`;

        if (confirm(formatMessage + '\n\nClick "OK" to select a file.')) {
            document.getElementById('importFileInput').click();
        }
    }

    const importFileInput = document.getElementById('importFileInput');
    importFileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const allowedExtensions = ['.csv', '.xlsx', '.xls'];
        const fileName = file.name.toLowerCase();
        const isValid = allowedExtensions.some(ext => fileName.endsWith(ext));
        if (!isValid) {
            alert('Please select a CSV or Excel file (.csv, .xlsx, .xls)');
            importFileInput.value = '';
            return;
        }
        if (!confirm(`Are you sure you want to import products from "${file.name}"?`)) {
            importFileInput.value = '';
            return;
        }
        const formData = new FormData();
        formData.append('file', file);
        try {
            const response = await fetch('/api/admin/inventory/import', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Import failed');
            alert(`✅ Import completed!\nInserted: ${result.inserted}\nUpdated: ${result.updated || 0}\nErrors: ${result.errors || 0}`);
            await loadProducts();
        } catch (err) {
            console.error('Import error:', err);
            alert(`❌ Import failed: ${err.message}`);
        } finally {
            importFileInput.value = '';
        }
    });

    window.onclick = function(event) {
        const modal = document.getElementById('productModal');
        if (event.target === modal) closeProductModal();
    };

    document.addEventListener('DOMContentLoaded', () => {
        loadProducts();
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') applyFilters(); });
    });
</script>
</body>
</html>
