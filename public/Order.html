<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUp Admin - Order Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f9f9f9; color: #262626; line-height: 1.6; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* Sidebar */
        .admin-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #262626; color: white; padding: 20px; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
        .sidebar h2 { font-size: 1.5rem; border-bottom: 1px solid #444; padding-bottom: 20px; }
        .sidebar nav a { display: block; color: #bbb; text-decoration: none; padding: 15px 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .sidebar nav a:hover, .sidebar nav a.active { color: white; font-weight: bold; border-left: 3px solid white; padding-left: 10px; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }

        /* Stats Cards */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: #fff; padding: 1.5rem; border: 1px solid #e5e5e5; border-radius: 8px; }
        .stat-value { font-size: 2rem; font-weight: 700; color: #262626; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #999; }

        /* Filter Bar */
        .filter-bar { background: #fff; padding: 1.5rem; border: 1px solid #e5e5e5; margin-bottom: 2rem; border-radius: 8px; }
        .filter-grid { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 150px; }
        .filter-group label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.25rem; }
        .filter-group input, .filter-group select { width: 100%; padding: 0.6rem; border: 1px solid #e5e5e5; font-family: inherit; }
        .btn { padding: 0.6rem 1.2rem; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.3s; letter-spacing: 0.05em; }
        .btn-primary { background: #262626; color: #fff; }
        .btn-primary:hover { background: #404040; }
        .btn-secondary { background: #fff; color: #262626; border: 1px solid #262626; }
        .btn-secondary:hover { background: #f5f5f5; }
        .export-btn { background: #27ae60; color: white; }
        .export-btn:hover { background: #2ecc71; }

        /* Sort & Export Bar */
        .sort-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
        .sort-select { padding: 0.5rem; border: 1px solid #e5e5e5; background: white; }

        /* Table */
        .order-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
        .order-table th { text-align: left; padding: 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 2px solid #262626; background: #fafafa; }
        .order-table td { padding: 1rem; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .badge { display: inline-block; padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge-pending { background: #f39c12; color: #fff; }
        .badge-processing { background: #3498db; color: #fff; }
        .badge-shipped { background: #27ae60; color: #fff; }
        .badge-delivered { background: #2c3e50; color: #fff; }
        .badge-cancelled { background: #e74c3c; color: #fff; }
        .btn-action { background: #262626; color: #fff; border: none; padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s; border-radius: 4px; }
        .btn-action:hover { background: #444; }
        .btn-danger { background: #e74c3c; color: #fff; border: none; }
        .btn-danger:hover { background: #c0392b; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: #fff; padding: 2rem; width: 90%; max-width: 500px; border-radius: 8px; position: relative; }
        .close-modal { position: absolute; top: 1rem; right: 1.5rem; font-size: 1.5rem; cursor: pointer; }

        @media (max-width: 768px) { .filter-group { min-width: 100%; } }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <aside class="sidebar">
        <h2>StepUp Admin</h2>
        <nav>
            <a href="admin.html">Staff Management</a>
            <a href="Inventory.html">Inventory Management</a>
            <a href="User.html">User Records</a>
            <a href="Order.html" class="active">Order Analytics</a>
            <a href="Sales.html">Sales Reports</a>
        </nav>
    </aside>

    <main class="main-content">
        <h1>Order Analytics</h1>

        <!-- Statistics Cards -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRevenue">MOP 0</div>
                <div class="stat-label">Total Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgOrderValue">MOP 0</div>
                <div class="stat-label">Avg. Order Value</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingOrders">0</div>
                <div class="stat-label">Pending / Processing</div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-bar">
            <div class="filter-grid">
                <div class="filter-group">
                    <label>Order Status</label>
                    <select id="statusFilter">
                        <option value="">All</option>
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Date From</label>
                    <input type="date" id="dateFrom">
                </div>
                <div class="filter-group">
                    <label>Date To</label>
                    <input type="date" id="dateTo">
                </div>
                <div class="filter-group">
                    <label>Customer Name / Email</label>
                    <input type="text" id="customerSearch" placeholder="Search...">
                </div>
                <div class="filter-group">
                    <label>Product (in order)</label>
                    <input type="text" id="productSearch" placeholder="Product name...">
                </div>
                <div class="filter-group">
                    <label>Min Total (MOP)</label>
                    <input type="number" id="minTotal" step="0.01" placeholder="Min">
                </div>
                <div class="filter-group">
                    <label>Max Total (MOP)</label>
                    <input type="number" id="maxTotal" step="0.01" placeholder="Max">
                </div>
                <div class="filter-group">
                    <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
                    <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
                </div>
            </div>
        </div>

        <!-- Sort & Export -->
        <div class="sort-bar">
            <div>
                <label>Sort by: </label>
                <select id="sortSelect" class="sort-select" onchange="applySorting()">
                    <option value="createdAt-desc">Date (Newest)</option>
                    <option value="createdAt-asc">Date (Oldest)</option>
                    <option value="total-desc">Total (High to Low)</option>
                    <option value="total-asc">Total (Low to High)</option>
                    <option value="status">Status</option>
                </select>
            </div>
            <button class="btn export-btn" onclick="exportToCSV()">📊 Export to CSV</button>
        </div>

        <!-- Orders Table -->
        <table class="order-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Customer</th>
                    <th>Products</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="orderTableBody">
                <tr><td colspan="7" style="text-align:center;">Loading orders...</td></tr>
            </tbody>
        </table>
    </main>
</div>

<!-- Modal for status update -->
<div id="statusModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2>Update Order Status</h2>
        <select id="modalStatusSelect" style="width:100%; padding:0.8rem; margin:1rem 0;">
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
        </select>
        <button class="btn btn-primary" style="width:100%;" onclick="updateOrderStatus()">Update</button>
    </div>
</div>

<script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'admin-login.html';

    let allOrders = [];
    let filteredOrders = [];
    let currentOrderId = null;

    // Fetch orders from backend
    async function loadOrders() {
        try {
            const res = await fetch('/api/admin/orders', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            allOrders = data.data;
            applyFilters(); // initial render
        } catch (err) {
            console.error(err);
            document.getElementById('orderTableBody').innerHTML = '<tr><td colspan="7" style="text-align:center;">Failed to load orders</td></tr>';
        }
    }

    // Filtering
    function applyFilters() {
        const status = document.getElementById('statusFilter').value;
        const dateFrom = document.getElementById('dateFrom').value;
        const dateTo = document.getElementById('dateTo').value;
        const customerSearch = document.getElementById('customerSearch').value.toLowerCase();
        const productSearch = document.getElementById('productSearch').value.toLowerCase();
        const minTotal = parseFloat(document.getElementById('minTotal').value);
        const maxTotal = parseFloat(document.getElementById('maxTotal').value);

        filteredOrders = allOrders.filter(order => {
            if (status && order.status !== status) return false;
            if (dateFrom && new Date(order.createdAt) < new Date(dateFrom)) return false;
            if (dateTo && new Date(order.createdAt) > new Date(dateTo)) return false;
            if (customerSearch) {
                const customerFull = `${order.customer.firstName} ${order.customer.lastName} ${order.customer.email}`.toLowerCase();
                if (!customerFull.includes(customerSearch)) return false;
            }
            if (productSearch) {
                const hasProduct = order.items.some(item => item.name.toLowerCase().includes(productSearch));
                if (!hasProduct) return false;
            }
            if (!isNaN(minTotal) && order.total < minTotal) return false;
            if (!isNaN(maxTotal) && order.total > maxTotal) return false;
            return true;
        });
        updateStats();
        applySorting();
    }

    function resetFilters() {
        document.getElementById('statusFilter').value = '';
        document.getElementById('dateFrom').value = '';
        document.getElementById('dateTo').value = '';
        document.getElementById('customerSearch').value = '';
        document.getElementById('productSearch').value = '';
        document.getElementById('minTotal').value = '';
        document.getElementById('maxTotal').value = '';
        applyFilters();
    }

    function updateStats() {
        const totalOrders = filteredOrders.length;
        const totalRevenue = filteredOrders.reduce((sum, o) => sum + o.total, 0);
        const avgOrder = totalOrders ? totalRevenue / totalOrders : 0;
        const pending = filteredOrders.filter(o => o.status === 'pending' || o.status === 'processing').length;

        document.getElementById('totalOrders').innerText = totalOrders;
        document.getElementById('totalRevenue').innerText = `MOP ${totalRevenue.toFixed(2)}`;
        document.getElementById('avgOrderValue').innerText = `MOP ${avgOrder.toFixed(2)}`;
        document.getElementById('pendingOrders').innerText = pending;
    }

    function applySorting() {
        const sortBy = document.getElementById('sortSelect').value;
        switch (sortBy) {
            case 'createdAt-desc':
                filteredOrders.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                break;
            case 'createdAt-asc':
                filteredOrders.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
                break;
            case 'total-desc':
                filteredOrders.sort((a,b) => b.total - a.total);
                break;
            case 'total-asc':
                filteredOrders.sort((a,b) => a.total - b.total);
                break;
            case 'status':
                filteredOrders.sort((a,b) => a.status.localeCompare(b.status));
                break;
        }
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('orderTableBody');
        if (filteredOrders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No orders found</td></tr>';
            return;
        }
        tbody.innerHTML = filteredOrders.map(order => `
            <tr data-id="${order._id}">
                <td>${order.orderId}</td>
                <td>${new Date(order.createdAt).toLocaleDateString()}</td>
                <td>${order.customer.firstName} ${order.customer.lastName}<br><small>${order.customer.email}</small></td>
                <td>${order.items.map(i => `${i.name} (x${i.quantity})`).join(', ')}</td>
                <td>MOP ${order.total.toFixed(2)}</td>
                <td><span class="badge badge-${order.status}">${order.status}</span></td>
                <td>
                    <button class="btn-action" onclick="openStatusModal('${order._id}', '${order.status}')">Update</button>
                    <button class="btn-action btn-danger" onclick="cancelOrder('${order._id}')" style="margin-left:5px;">Cancel</button>
                </td>
            </tr>
        `).join('');
    }

    // Modal handling
    function openStatusModal(orderId, currentStatus) {
        currentOrderId = orderId;
        document.getElementById('modalStatusSelect').value = currentStatus;
        document.getElementById('statusModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('statusModal').style.display = 'none';
        currentOrderId = null;
    }

    async function updateOrderStatus() {
        if (!currentOrderId) return;
        const newStatus = document.getElementById('modalStatusSelect').value;
        try {
            const res = await fetch(`/api/admin/orders/${currentOrderId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status: newStatus })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            closeModal();
            loadOrders(); // refresh
        } catch (err) {
            alert(err.message);
        }
    }

    async function cancelOrder(orderId) {
        if (!confirm('Cancel this order?')) return;
        try {
            const res = await fetch(`/api/admin/orders/${orderId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            loadOrders();
        } catch (err) {
            alert(err.message);
        }
    }

    function exportToCSV() {
        if (filteredOrders.length === 0) {
            alert('No data to export');
            return;
        }
        const headers = ['Order ID', 'Date', 'Customer Name', 'Email', 'Products', 'Total', 'Status'];
        const rows = filteredOrders.map(o => [
            o.orderId,
            new Date(o.createdAt).toLocaleDateString(),
            `${o.customer.firstName} ${o.customer.lastName}`,
            o.customer.email,
            o.items.map(i => `${i.name} (${i.size}, x${i.quantity})`).join('; '),
            o.total,
            o.status
        ]);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', 'orders_export.csv');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
        loadOrders();
        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target === document.getElementById('statusModal')) closeModal();
        };
    });
</script>
</body>
</html>
