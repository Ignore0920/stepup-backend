<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUp Admin - Account Creation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* All your existing CSS – keep unchanged */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #f9f9f9; color: #262626; line-height: 1.6; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .admin-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #262626; color: white; padding: 20px; flex-shrink: 0; }
        .sidebar h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; border-bottom: 1px solid #444; padding-bottom: 20px; margin-top: 0; }
        .sidebar nav a { display: block; color: #bbb; text-decoration: none; padding: 15px 0; transition: 0.3s; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar nav a:hover, .sidebar nav a.active { color: white; font-weight: bold; }
        .sidebar nav a.active { border-left: 3px solid white; padding-left: 10px; }
        .main-content { flex-grow: 1; padding: 40px; box-sizing: border-box; max-width: calc(100vw - 250px); overflow-y: auto; }
        .admin-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
        .admin-section { background: #fff; padding: 2.5rem; border: 1px solid #e5e5e5; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .btn { padding: 0.85rem 2rem; font-size: 0.875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; border: none; cursor: pointer; transition: all 0.3s; width: 100%; }
        .btn-primary { background-color: #262626; color: #ffffff; }
        .btn-primary:hover { background-color: #404040; transform: translateY(-1px); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .form-control { width: 100%; padding: 0.9rem; border: 1px solid #e5e5e5; font-family: 'Montserrat', sans-serif; transition: border-color 0.3s; }
        .form-control:focus { outline: none; border-color: #262626; }
        .stat-card { background: #262626; color: #fff; padding: 2rem; text-align: center; margin-bottom: 2rem; }
        .stat-number { font-size: 3rem; font-family: 'Playfair Display', serif; font-weight: 900; line-height: 1; margin-bottom: 0.5rem; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 500; opacity: 0.8; }
        .team-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .team-table th { text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 1rem; border-bottom: 2px solid #262626; }
        .team-table td { padding: 1rem; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .role-badge { font-size: 0.7rem; font-weight: 700; background: #f0f0f0; padding: 0.2rem 0.6rem; border-radius: 2px; text-transform: uppercase; }
        .action-btns { display: flex; gap: 0.5rem; }
        .btn-action { padding: 0.4rem 0.8rem; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; cursor: pointer; border: 1px solid #e5e5e5; background: #fff; transition: all 0.2s; }
        .btn-edit:hover { background: #262626; color: #fff; border-color: #262626; }
        .btn-remove:hover { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; padding: 2.5rem; width: 100%; max-width: 450px; position: relative; animation: modalFadeIn 0.3s ease-out; }
        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .close-modal { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; }
        .close-modal:hover { color: #262626; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <aside class="sidebar">
        <h2>StepUp Admin</h2>
        <nav>
            <a href="admin.html" class="active">Staff Management</a>
            <a href="Inventory.html">Inventory Management</a>
            <a href="User.html">User Records</a>
            <a href="Order.html">Order Fulfillment</a>
            <a href="dashboard.html">Dashboard</a>
            <hr style="margin: 20px 0; border-color: #444;">
            <a href="#" onclick="logoutAdmin(); return false;" style="color: #e74c3c;">Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="admin-grid">
            <aside>
                <div class="stat-card">
                    <div class="stat-number" id="adminCount">0</div>
                    <div class="stat-label">Total Admin Staff</div>
                </div>
                <div class="admin-section">
                    <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Create Account</h2>
                    <form id="addAdminForm">
                        <div class="form-group">
                            <label>Staff Username</label>
                            <input type="text" id="newAdminName" class="form-control" placeholder="e.g. j_walker" required>
                        </div>
                        <div class="form-group">
                            <label>Authority Level</label>
                            <select id="newAdminRole" class="form-control">
                                <option>Manager</option>
                                <option>Inventory Specialist</option>
                                <option>Order Editor</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Temporary Password</label>
                            <input type="password" id="newAdminPass" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Authorize Member</button>
                    </form>
                </div>
            </aside>
            <div class="admin-section">
                <h2 style="margin-bottom: 0.5rem; font-size: 1.8rem;">Admin Team Management</h2>
                <p style="color: #666; font-size: 0.9rem; margin-bottom: 2rem;">Authorized personnel with backstage access permissions.</p>
                <table class="team-table">
                    <thead>
                        <tr><th>Username</th><th>Role</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="teamList"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal" id="cancelBtn">&times;</button>
        <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem;">Edit Member Permissions</h2>
        <form id="editAdminForm">
            <div class="form-group">
                <label>Staff Username</label>
                <input type="text" id="editAdminName" class="form-control" required>
            </div>
            <div class="form-group">
                <label>New Password (leave blank to keep unchanged)</label>
                <input type="password" id="editAdminPassword" class="form-control" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>

<!-- ========== SCRIPT MOVED TO THE BOTTOM ========== -->
<script>
    // Check admin token on page load
    const token = localStorage.getItem('adminToken');
    if (!token) {
        window.location.href = 'admin-login.html';
    }

    async function verifyToken() {
        try {
            const response = await fetch('/api/admin/verify', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error('Invalid token');
        } catch (err) {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        }
    }
    verifyToken();

    function logoutAdmin() {
        localStorage.removeItem('adminToken');
        window.location.href = 'admin-login.html';
    }

    let currentEditingId = null;

    async function loadAdmins() {
        try {
            const response = await fetch('/api/admins', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error);
            const tbody = document.getElementById('teamList');
            tbody.innerHTML = '';
            data.data.forEach(admin => {
                const row = tbody.insertRow();
                row.setAttribute('data-id', admin._id);
                row.innerHTML = `
                    <td>${escapeHtml(admin.username)}</td>
                    <td><span class="role-badge">Admin</span></td>
                    <td style="color: #27ae60; font-weight: 600;">Active</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-action btn-edit" onclick="openEditModal('${admin._id}', '${escapeHtml(admin.username)}')">Edit</button>
                            <button class="btn-action btn-remove" onclick="removeAdmin('${admin._id}', '${escapeHtml(admin.username)}')">Remove</button>
                        </div>
                    </td>
                `;
            });
            document.getElementById('adminCount').innerText = data.data.length;
        } catch (err) {
            console.error(err);
            alert('Failed to load admins: ' + err.message);
        }
    }

    function openEditModal(id, username) {
        currentEditingId = id;
        document.getElementById('editAdminName').value = username;
        document.getElementById('editAdminPassword').value = '';
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
        currentEditingId = null;
    }

    async function removeAdmin(id, username) {
        if (confirm(`Are you sure you want to remove admin "${username}"?`)) {
            try {
                const response = await fetch(`/api/admins/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                alert('Admin removed');
                loadAdmins();
            } catch (err) {
                alert(err.message);
            }
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // --- Event listeners – now all elements exist because script is at the bottom ---
    const addAdminForm = document.getElementById('addAdminForm');
    if (addAdminForm) {
        addAdminForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('newAdminName');
const password = document.getElementById('newAdminPass');
if (!username.checkValidity()) { username.reportValidity(); return; }
if (!password.checkValidity()) { password.reportValidity(); return; }
            try {
                const response = await fetch('/api/admins', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                alert('Admin created successfully!');
                loadAdmins();
                addAdminForm.reset();
            } catch (err) {
                alert(err.message);
            }
        });
    } else {
        console.error('addAdminForm not found');
    }

    const editAdminForm = document.getElementById('editAdminForm');
    if (editAdminForm) {
        editAdminForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newUsername = document.getElementById('editAdminName').value.trim();
            const newPassword = document.getElementById('editAdminPassword').value;
            if (!newUsername) {
                alert('Username cannot be empty');
                return;
            }
            const updateData = { username: newUsername };
            if (newPassword) updateData.password = newPassword;
            try {
                const response = await fetch(`/api/admins/${currentEditingId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(updateData)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                alert('Admin updated successfully');
                loadAdmins();
                closeEditModal();
            } catch (err) {
                alert(err.message);
            }
        });
    } else {
        console.error('editAdminForm not found');
    }

    const cancelBtn = document.getElementById('cancelBtn');
    if (cancelBtn) {
        cancelBtn.addEventListener('click', closeEditModal);
    } else {
        console.error('cancelBtn not found');
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('editModal')) closeEditModal();
    };

    // Load admins after everything is ready
    loadAdmins();
</script>
</body>
</html>
