<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - StepUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #ffffff; color: #262626; line-height: 1.6; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
        header { position: sticky; top: 0; z-index: 50; background-color: #ffffff; border-bottom: 1px solid #e5e5e5; }
        .header-content { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0; }
        .logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .logo-box { width: 40px; height: 40px; background-color: #262626; display: flex; align-items: center; justify-content: center; color: #ffffff; font-weight: bold; font-size: 1.125rem; }
        .logo-text { font-size: 1.5rem; font-weight: bold; letter-spacing: 0.05em; }
        nav { display: flex; gap: 2rem; }
        nav a { text-decoration: none; color: #262626; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.3s; }
        nav a:hover { color: #666666; }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .nav-right button { background: none; border: none; cursor: pointer; color: #262626; font-size: 1.25rem; transition: color 0.3s; position: relative; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background-color: #262626; color: #ffffff; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
        .user-icon-btn { text-decoration: none; color: #262626; font-size: 1.25rem; transition: color 0.3s; }
        .product-section { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; padding: 3rem 0; align-items: start; }
        .product-images { display: flex; flex-direction: column; gap: 1rem; position: sticky; top: 100px; }
        .main-image { width: 100%; height: 500px; background-color: #f5f5f5; border: 1px solid #e5e5e5; background-size: contain; background-repeat: no-repeat; background-position: center; display: flex; align-items: center; justify-content: center; }
        .product-details { display: flex; flex-direction: column; }
        .product-brand { color: #262626; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .product-title { font-size: 2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .product-price { font-size: 1.75rem; font-weight: bold; margin-bottom: 0.5rem; color: #262626; }
        .product-description { color: #666666; margin-bottom: 2rem; line-height: 1.8; }
        .size-options { margin-bottom: 2rem; }
        .size-options h3 { font-size: 1rem; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .size-buttons { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .size-btn { padding: 0.75rem 1rem; border: 1px solid #e5e5e5; background-color: #ffffff; cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: all 0.3s; border-radius: 4px; }
        .size-btn:hover { border-color: #262626; }
        .size-btn.active { background-color: #262626; color: #ffffff; border-color: #262626; }
        .purchase-section { display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; }
        .quantity-control { display: flex; align-items: center; border: 1px solid #e5e5e5; }
        .qty-btn { width: 40px; height: 40px; border: none; background-color: #f5f5f5; cursor: pointer; font-size: 1rem; }
        .qty-input { width: 60px; height: 40px; border: none; border-left: 1px solid #e5e5e5; border-right: 1px solid #e5e5e5; text-align: center; font-size: 0.875rem; }
        .add-to-cart-btn { flex: 1; padding: 1rem; background-color: #262626; color: #ffffff; border: none; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .add-to-cart-btn:hover { opacity: 0.9; }
        .back-link { display: inline-block; margin: 1.5rem 0 0.5rem; text-decoration: none; color: #262626; font-size: 0.875rem; font-weight: 500; border-bottom: 1px solid #262626; transition: color 0.3s, border-color 0.3s; }
        .back-link:hover { color: #666666; border-bottom-color: #666666; }

        /* You May Also Like 样式 */
        .recommendations-section {
            margin: 4rem 0 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e5e5;
        }
        .recommendations-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }
        .recommendations-title::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 0;
            width: 60px;
            height: 3px;
            background-color: #262626;
        }
        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .rec-card {
            background-color: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        .rec-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .rec-image {
            width: 100%;
            height: 200px;
            background-color: #f0f0f0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rec-info {
            padding: 1rem;
            flex: 1;
        }
        .rec-brand {
            font-size: 0.7rem;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }
        .rec-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .rec-price {
            font-size: 1rem;
            font-weight: bold;
            color: #000;
        }

        @media (max-width: 768px) {
            .product-section { grid-template-columns: 1fr; }
            .main-image { height: 400px; }
            .purchase-section { flex-direction: column; }
            .add-to-cart-btn { width: 100%; }
            nav { display: none; }
            .recommendations-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }
            .rec-image { height: 150px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo" onclick="window.location.href='mainpage.html'"><div class="logo-box">S</div><div class="logo-text">STEPUP</div></div>
                <nav><a href="products.html">Shop</a><a href="mainpage.html#collections">Collections</a><a href="mainpage.html#brands">Brands</a><a href="about.html">About</a></nav>
                <div class="nav-right"><button title="Shopping Cart" onclick="location.href='shopping-cart.html'" style="position: relative;">🛒<span class="cart-badge" id="cartBadge">0</span></button><a href="account.html" class="user-icon-btn">👤</a></div>
            </div>
        </div>
    </header>

    <div class="container">
        <a href="products.html" class="back-link">← Back to Products</a>
        <div id="productDetail" class="product-detail-container"><div class="loading">Loading product...</div></div>
        <!-- You May Also Like 区域将动态插入此处 -->
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let allProducts = [];   // 存储所有商品用于推荐

        if (!productId) {
            document.getElementById('productDetail').innerHTML = '<p class="error">Product not specified.</p>';
        } else {
            // 先加载当前商品详情
            fetch(`/api/products/${productId}`)
                .then(res => res.json())
                .then(product => {
                    if (product.error) throw new Error(product.error);
                    renderProduct(product);
                    // 商品详情渲染完成后，加载所有商品用于推荐
                    return fetch('/api/products');
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        allProducts = data.data;
                        renderRecommendations(productId);
                    }
                })
                .catch(err => {
                    document.getElementById('productDetail').innerHTML = `<p class="error">Product not found: ${err.message}</p>`;
                });
        }

        function parseSizes(sizeRange) {
            if (!sizeRange) return [];
            if (sizeRange.includes('-')) {
                const [start, end] = sizeRange.split('-').map(Number);
                if (isNaN(start) || isNaN(end)) return [];
                const sizes = [];
                for (let i = start; i <= end; i++) sizes.push(i.toString());
                return sizes;
            }
            if (sizeRange.includes(',')) {
                return sizeRange.split(',').map(s => s.trim());
            }
            return [sizeRange];
        }

        let selectedSize = null;

        function renderProduct(p) {
            const sizes = parseSizes(p.sizeRange);
            let sizeHtml = '';
            if (sizes.length > 0) {
                sizeHtml = `
                    <div class="size-options">
                        <h3>Select Size</h3>
                        <div class="size-buttons" id="sizeButtons">
                            ${sizes.map(size => `<button class="size-btn" data-size="${size}">${size}</button>`).join('')}
                        </div>
                    </div>
                `;
            } else {
                sizeHtml = `<div class="size-options"><p>Size not available</p></div>`;
            }

            const html = `
                <div class="product-section">
                    <div class="product-images">
                        <div class="main-image" style="background-image: url('${p.image || ''}');">
                            ${!p.image ? '<span style="font-size: 5rem;">👟</span>' : ''}
                        </div>
                    </div>
                    <div class="product-details">
                        <p class="product-brand">${p.brand}</p>
                        <h1 class="product-title">${p.name}</h1>
                        <div class="product-price">MOP $${p.price.toFixed(2)}</div>
                        <p class="product-description">${p.description || 'Premium athletic footwear with exceptional comfort and style.'}</p>
                        ${sizeHtml}
                        <div class="purchase-section">
                            <div class="quantity-control"><button class="qty-btn">−</button><input type="number" class="qty-input" value="1" min="1"><button class="qty-btn">+</button></div>
                            <button class="add-to-cart-btn" data-id="${p._id}" data-name="${p.name}" data-price="${p.price}">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('productDetail').innerHTML = html;
            attachSizeListeners();
            attachCartHandler(p);
        }

        function attachSizeListeners() {
            const sizeBtns = document.querySelectorAll('.size-btn');
            sizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    sizeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedSize = btn.getAttribute('data-size');
                });
            });
        }

        function attachCartHandler(p) {
            const qtyInput = document.querySelector('.qty-input');
            document.querySelector('.qty-btn:first-child').addEventListener('click', () => { let v = parseInt(qtyInput.value); if(v>1) qtyInput.value = v-1; });
            document.querySelector('.qty-btn:last-child').addEventListener('click', () => { qtyInput.value = parseInt(qtyInput.value) + 1; });
            document.querySelector('.add-to-cart-btn').addEventListener('click', () => {
                if (!selectedSize && document.querySelector('.size-btn')) {
                    alert('Please select a size');
                    return;
                }
                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                const existing = cart.find(item => item.id === p._id && item.size === selectedSize);
                const qty = parseInt(qtyInput.value);
                if (existing) existing.quantity += qty;
                else cart.push({
                    id: p._id,
                    brand: p.brand,
                    name: p.name,
                    price: `MOP $${p.price.toFixed(2)}`,
                    quantity: qty,
                    image: p.image,
                    size: selectedSize
                });
                localStorage.setItem('cart', JSON.stringify(cart));
                alert('Added to cart!');
                updateCartBadge();
            });
        }

        // 个性化推荐算法
        function getRecommendations(currentProduct, allProducts, limit = 4) {
            if (!allProducts.length) return [];
            // 排除当前商品
            const candidates = allProducts.filter(p => p._id !== currentProduct._id);
            if (candidates.length === 0) return [];

            // 计算每个候选商品的得分
            const scored = candidates.map(candidate => {
                let score = 0;
                // 1. 相同品牌 +50
                if (candidate.brand === currentProduct.brand) score += 50;
                // 2. 相同集合（collection）+30
                if (candidate.collection && currentProduct.collection && candidate.collection === currentProduct.collection) score += 30;
                // 3. 相同标签（tag）+20
                if (candidate.tag && currentProduct.tag && candidate.tag === currentProduct.tag) score += 20;
                // 4. 价格相近（相差20%以内）+15
                const priceDiffPercent = Math.abs(candidate.price - currentProduct.price) / currentProduct.price;
                if (priceDiffPercent <= 0.2) score += 15;
                // 5. 品牌知名度影响：若品牌是主流品牌且非相同品牌，也可轻微加分（但不如相同品牌高）
                // 6. 随机种子打破平局（可选）
                return { product: candidate, score };
            });

            // 按得分降序排序，取前 limit 个
            scored.sort((a, b) => b.score - a.score);
            return scored.slice(0, limit).map(item => item.product);
        }

        function renderRecommendations(currentProductId) {
            const currentProduct = allProducts.find(p => p._id === currentProductId);
            if (!currentProduct) return;

            const recommendations = getRecommendations(currentProduct, allProducts, 4);
            if (recommendations.length === 0) return;

            // 查找或创建推荐区域容器
            let recContainer = document.getElementById('recommendationsContainer');
            if (!recContainer) {
                const productDetailDiv = document.getElementById('productDetail');
                const recSection = document.createElement('div');
                recSection.id = 'recommendationsContainer';
                recSection.className = 'recommendations-section';
                productDetailDiv.insertAdjacentElement('afterend', recSection);
                recContainer = recSection;
            }

            const recHtml = `
                <div class="recommendations-title">You May Also Like</div>
                <div class="recommendations-grid" id="recommendationsGrid">
                    ${recommendations.map(rec => `
                        <a href="product-detail.html?id=${rec._id}" class="rec-card">
                            <div class="rec-image" style="background-image: url('${rec.image || ''}');">
                                ${!rec.image ? '<span style="font-size: 2rem;">👟</span>' : ''}
                            </div>
                            <div class="rec-info">
                                <div class="rec-brand">${rec.brand}</div>
                                <div class="rec-name">${rec.name}</div>
                                <div class="rec-price">MOP $${rec.price.toFixed(2)}</div>
                            </div>
                        </a>
                    `).join('')}
                </div>
            `;
            recContainer.innerHTML = recHtml;
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            const badge = document.getElementById('cartBadge');
            if (badge) badge.textContent = total;
        }

        updateCartBadge();
    </script>
</body>
</html>
