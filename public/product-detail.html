<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - StepUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #ffffff; color: #262626; line-height: 1.6; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
        header { position: sticky; top: 0; z-index: 50; background-color: #ffffff; border-bottom: 1px solid #e5e5e5; }
        .header-content { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0; }
        .logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .logo-box { width: 40px; height: 40px; background-color: #262626; display: flex; align-items: center; justify-content: center; color: #ffffff; font-weight: bold; font-size: 1.125rem; }
        .logo-text { font-size: 1.5rem; font-weight: bold; letter-spacing: 0.05em; }
        nav { display: flex; gap: 2rem; }
        nav a { text-decoration: none; color: #262626; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.3s; }
        nav a:hover { color: #666666; }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .nav-right button { background: none; border: none; cursor: pointer; color: #262626; font-size: 1.25rem; transition: color 0.3s; position: relative; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background-color: #262626; color: #ffffff; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
        .user-icon-btn { text-decoration: none; color: #262626; font-size: 1.25rem; transition: color 0.3s; }
        .product-section { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; padding: 3rem 0; align-items: start; }
        .product-images { display: flex; flex-direction: column; gap: 1rem; position: sticky; top: 100px; }
        .main-image { width: 100%; height: 500px; background-color: #f5f5f5; border: 1px solid #e5e5e5; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .product-details { display: flex; flex-direction: column; }
        .product-brand { color: #262626; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .product-title { font-size: 2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .product-price { font-size: 1.75rem; font-weight: bold; margin-bottom: 0.5rem; color: #262626; }
        .product-description { color: #666666; margin-bottom: 2rem; line-height: 1.8; }
        .size-options { margin-bottom: 2rem; }
        .size-options h3 { font-size: 1rem; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .size-buttons { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .size-btn { padding: 0.75rem 1rem; border: 1px solid #e5e5e5; background-color: #ffffff; cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: all 0.3s; border-radius: 4px; }
        .size-btn:hover { border-color: #262626; }
        .size-btn.active { background-color: #262626; color: #ffffff; border-color: #262626; }
        .purchase-section { display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; }
        .quantity-control { display: flex; align-items: center; border: 1px solid #e5e5e5; }
        .qty-btn { width: 40px; height: 40px; border: none; background-color: #f5f5f5; cursor: pointer; font-size: 1rem; }
        .qty-input { width: 60px; height: 40px; border: none; border-left: 1px solid #e5e5e5; border-right: 1px solid #e5e5e5; text-align: center; font-size: 0.875rem; }
        .add-to-cart-btn { flex: 1; padding: 1rem; background-color: #262626; color: #ffffff; border: none; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .add-to-cart-btn:hover { opacity: 0.9; }
        @media (max-width: 768px) { .product-section { grid-template-columns: 1fr; } .main-image { height: 400px; } .purchase-section { flex-direction: column; } .add-to-cart-btn { width: 100%; } nav { display: none; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo" onclick="window.location.href='mainpage.html'"><div class="logo-box">S</div><div class="logo-text">STEPUP</div></div>
                <nav><a href="products.html">Shop</a><a href="mainpage.html#collections">Collections</a><a href="mainpage.html#brands">Brands</a><a href="about.html">About</a></nav>
                <div class="nav-right"><button title="Shopping Cart" onclick="location.href='shopping-cart.html'" style="position: relative;">🛒<span class="cart-badge" id="cartBadge">0</span></button><a href="account.html" class="user-icon-btn">👤</a></div>
            </div>
        </div>
    </header>
    <div class="container"><div id="productDetail" class="product-detail-container"><div class="loading">Loading product...</div></div></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        if (!productId) document.getElementById('productDetail').innerHTML = '<p class="error">Product not specified.</p>';
        else fetch(`/api/products/${productId}`).then(res => res.json()).then(product => { if (product.error) throw new Error(product.error); renderProduct(product); }).catch(err => { document.getElementById('productDetail').innerHTML = `<p class="error">Product not found: ${err.message}</p>`; });

        function parseSizes(sizeRange) {
            if (!sizeRange) return [];
            // Handle range like "7-13"
            if (sizeRange.includes('-')) {
                const [start, end] = sizeRange.split('-').map(Number);
                if (isNaN(start) || isNaN(end)) return [];
                const sizes = [];
                for (let i = start; i <= end; i++) sizes.push(i.toString());
                return sizes;
            }
            // Handle comma-separated list
            if (sizeRange.includes(',')) {
                return sizeRange.split(',').map(s => s.trim());
            }
            // Single size
            return [sizeRange];
        }

        let selectedSize = null;

        function renderProduct(p) {
            const sizes = parseSizes(p.sizeRange);
            let sizeHtml = '';
            if (sizes.length > 0) {
                sizeHtml = `
                    <div class="size-options">
                        <h3>Select Size</h3>
                        <div class="size-buttons" id="sizeButtons">
                            ${sizes.map(size => `<button class="size-btn" data-size="${size}">${size}</button>`).join('')}
                        </div>
                    </div>
                `;
            } else {
                sizeHtml = `<div class="size-options"><p>Size not available</p></div>`;
            }

            const html = `
                <div class="product-section">
                    <div class="product-images"><div class="main-image" style="background-image: url('${p.image || 'https://via.placeholder.com/600?text=No+Image'}');"></div></div>
                    <div class="product-details">
                        <p class="product-brand">${p.brand}</p>
                        <h1 class="product-title">${p.name}</h1>
                        <div class="product-price">MOP $${p.price.toFixed(2)}</div>
                        <p class="product-description">${p.description || 'Premium athletic footwear with exceptional comfort and style.'}</p>
                        ${sizeHtml}
                        <div class="purchase-section">
                            <div class="quantity-control"><button class="qty-btn">−</button><input type="number" class="qty-input" value="1" min="1"><button class="qty-btn">+</button></div>
                            <button class="add-to-cart-btn" data-id="${p._id}" data-name="${p.name}" data-price="${p.price}">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('productDetail').innerHTML = html;
            attachSizeListeners();
            attachCartHandler(p);
        }

        function attachSizeListeners() {
            const sizeBtns = document.querySelectorAll('.size-btn');
            sizeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    sizeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedSize = btn.getAttribute('data-size');
                });
            });
        }

        function attachCartHandler(p) {
            const qtyInput = document.querySelector('.qty-input');
            document.querySelector('.qty-btn:first-child').addEventListener('click', () => { let v = parseInt(qtyInput.value); if(v>1) qtyInput.value = v-1; });
            document.querySelector('.qty-btn:last-child').addEventListener('click', () => { qtyInput.value = parseInt(qtyInput.value) + 1; });
            document.querySelector('.add-to-cart-btn').addEventListener('click', () => {
                if (!selectedSize && document.querySelector('.size-btn')) {
                    alert('Please select a size');
                    return;
                }
                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                const existing = cart.find(item => item.id === p._id && item.size === selectedSize);
                const qty = parseInt(qtyInput.value);
                if (existing) existing.quantity += qty;
                else cart.push({
                    id: p._id,
                    brand: p.brand,
                    name: p.name,
                    price: `MOP $${p.price.toFixed(2)}`,
                    quantity: qty,
                    image: p.image,
                    size: selectedSize
                });
                localStorage.setItem('cart', JSON.stringify(cart));
                alert('Added to cart!');
                updateCartBadge();
            });
        }

        function updateCartBadge() { const cart = JSON.parse(localStorage.getItem('cart')) || []; const total = cart.reduce((s,i) => s + i.quantity, 0); document.getElementById('cartBadge').textContent = total; }
        updateCartBadge();
    </script>
</body>
</html>
