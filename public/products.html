<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - StepUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #ffffff; color: #262626; line-height: 1.6; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', serif; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
        header { position: sticky; top: 0; z-index: 50; background-color: #ffffff; border-bottom: 1px solid #e5e5e5; }
        .header-content { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 0; }
        .logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .logo-box { width: 40px; height: 40px; background-color: #262626; display: flex; align-items: center; justify-content: center; color: #ffffff; font-weight: bold; font-size: 1.125rem; font-family: 'Playfair Display', serif; }
        .logo-text { font-size: 1.5rem; font-weight: bold; letter-spacing: 0.05em; font-family: 'Playfair Display', serif; }
        nav { display: flex; gap: 2rem; }
        nav a { text-decoration: none; color: #262626; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.3s; }
        nav a:hover { color: #666666; }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .nav-right button { background: none; border: none; cursor: pointer; color: #262626; font-size: 1.25rem; transition: color 0.3s; position: relative; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background-color: #262626; color: #ffffff; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
        .user-icon-btn { text-decoration: none; color: #262626; font-size: 1.25rem; transition: color 0.3s; }
        .search-bar { margin: 2rem 0; display: flex; gap: 1rem; }
        .search-input { flex: 1; padding: 0.75rem 1rem; border: 1px solid #e5e5e5; border-radius: 4px; font-size: 0.95rem; }
        .search-input:focus { outline: none; border-color: #262626; }
        .search-button { padding: 0.75rem 1.5rem; background-color: #262626; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; }
        .products-page { display: grid; grid-template-columns: 250px 1fr; gap: 2rem; padding: 2rem 0; }
        
        /* 侧边栏筛选 */
        .sidebar { background-color: #f9f9f9; padding: 1.5rem; border-radius: 8px; height: fit-content; }
        .filter-group { margin-bottom: 1.5rem; }
        .filter-group h3 { font-size: 0.9rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .filter-options { display: flex; flex-direction: column; gap: 0.5rem; max-height: 200px; overflow-y: auto; padding-right: 0.5rem; }
        .filter-option { display: flex; align-items: center; gap: 0.5rem; }
        .filter-option input { width: 16px; height: 16px; cursor: pointer; }
        .filter-option label { cursor: pointer; font-size: 0.85rem; text-transform: capitalize; }
        .filter-option .count { margin-left: auto; font-size: 0.75rem; color: #999; }
        
        .products-section { background-color: #ffffff; }
        .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e5e5; }
        .products-header h2 { font-size: 1.5rem; }
        .sort-dropdown { padding: 0.5rem 1rem; border: 1px solid #ddd; border-radius: 4px; background-color: #fff; cursor: pointer; font-size: 0.9rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 2rem; }
        .product-card { background-color: #fff; border-radius: 8px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: flex; flex-direction: column; border: 1px solid #e5e5e5; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .product-image { width: 100%; height: 250px; background-color: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .product-info { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
        .product-brand { font-size: 0.8rem; color: #999; text-transform: uppercase; margin-bottom: 0.25rem; }
        .product-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.3; }
        .product-price { font-size: 1.1rem; font-weight: bold; color: #000; margin-top: auto; }
        .product-tag { display: inline-block; background-color: #ff6b6b; color: white; padding: 0.25rem 0.5rem; border-radius: 3px; font-size: 0.7rem; margin-top: 0.5rem; width: fit-content; }
        .no-products { text-align: center; padding: 3rem; color: #999; }
        
        /* 清除筛选按钮 */
        .clear-filters-btn {
            width: 100%;
            padding: 0.6rem;
            background-color: #e5e5e5;
            color: #262626;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .clear-filters-btn:hover {
            background-color: #262626;
            color: #ffffff;
        }

        @media (max-width: 768px) { 
            .products-page { grid-template-columns: 1fr; } 
            .sidebar { display: block; } 
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } 
            nav { display: none; } 
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo" onclick="window.location.href='mainpage.html'">
                    <div class="logo-box">S</div>
                    <div class="logo-text">STEPUP</div>
                </div>
                <nav>
                    <a href="mainpage.html#shop">Shop</a>
                    <a href="mainpage.html#collections">Collections</a>
                    <a href="mainpage.html#brands">Brands</a>
                    <a href="about.html">About</a>
                </nav>
                <div class="nav-right">
                    <button title="Shopping Cart" onclick="location.href='shopping-cart.html'" style="position: relative;">
                        🛒
                        <span class="cart-badge" id="cartBadge">0</span>
                    </button>
                    <a href="account.html" class="user-icon-btn">👤</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search products..." onkeyup="applyFilters()">
            <button class="search-button" onclick="applyFilters()">Search</button>
        </div>
        
        <div class="products-page">
            <aside class="sidebar">
                <!-- Brand Filter - 动态生成 -->
                <div class="filter-group">
                    <h3>Brand</h3>
                    <div class="filter-options" id="brandFilters"></div>
                </div>
                
                <!-- Collection Filter - 动态生成 -->
                <div class="filter-group">
                    <h3>Collection</h3>
                    <div class="filter-options" id="collectionFilters"></div>
                </div>
                
                <!-- Tag Filter - 动态生成 -->
                <div class="filter-group">
                    <h3>Tag</h3>
                    <div class="filter-options" id="tagFilters"></div>
                </div>
                
                <!-- 清除所有筛选 -->
                <button class="clear-filters-btn" onclick="clearAllFilters()">Clear All Filters</button>
            </aside>
            
            <div class="products-section">
                <div class="products-header">
                    <h2 id="productCount">All Products</h2>
                    <select class="sort-dropdown" id="sortSelect" onchange="applySorting()">
                        <option value="default">Sort By</option>
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                    </select>
                </div>
                <div class="products-grid" id="productsGrid"></div>
                <div class="no-products" id="noProducts" style="display: none;">
                    <p>No products found matching your filters.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let filteredProducts = [];
        let searchQuery = '';
        
        // 存储筛选状态
        let selectedBrands = new Set();
        let selectedCollections = new Set();
        let selectedTags = new Set();

        // 加载所有产品
        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const data = await res.json();
                if (data.success) { 
                    products = data.data; 
                    filteredProducts = [...products]; 
                    generateFilterOptions();
                    renderProducts();
                } else {
                    throw new Error('Failed to load products');
                }
            } catch (err) { 
                console.error(err); 
                document.getElementById('productsGrid').innerHTML = '<div class="no-products"><p>Error loading products.</p></div>'; 
            }
        }

        // 动态生成筛选选项（根据实际产品数据）
        function generateFilterOptions() {
            // 统计各分类的产品数量
            const brandCount = {};
            const collectionCount = {};
            const tagCount = {};
            
            products.forEach(p => {
                // 统计品牌
                if (p.brand) {
                    brandCount[p.brand] = (brandCount[p.brand] || 0) + 1;
                }
                // 统计集合
                if (p.collection) {
                    collectionCount[p.collection] = (collectionCount[p.collection] || 0) + 1;
                }
                // 统计标签
                if (p.tag) {
                    tagCount[p.tag] = (tagCount[p.tag] || 0) + 1;
                }
            });
            
            // 生成品牌筛选 HTML
            const brandContainer = document.getElementById('brandFilters');
            const sortedBrands = Object.keys(brandCount).sort();
            brandContainer.innerHTML = sortedBrands.map(brand => `
                <div class="filter-option">
                    <input type="checkbox" id="brand-${brand.replace(/\s+/g, '-').toLowerCase()}" 
                           value="${brand}" onchange="toggleFilter('brand', '${brand}', this.checked)">
                    <label for="brand-${brand.replace(/\s+/g, '-').toLowerCase()}">${brand}</label>
                    <span class="count">(${brandCount[brand]})</span>
                </div>
            `).join('');
            
            // 生成集合筛选 HTML
            const collectionContainer = document.getElementById('collectionFilters');
            const sortedCollections = Object.keys(collectionCount).sort();
            collectionContainer.innerHTML = sortedCollections.map(collection => `
                <div class="filter-option">
                    <input type="checkbox" id="collection-${collection.replace(/\s+/g, '-').toLowerCase()}" 
                           value="${collection}" onchange="toggleFilter('collection', '${collection}', this.checked)">
                    <label for="collection-${collection.replace(/\s+/g, '-').toLowerCase()}">${collection}</label>
                    <span class="count">(${collectionCount[collection]})</span>
                </div>
            `).join('');
            
            // 生成标签筛选 HTML
            const tagContainer = document.getElementById('tagFilters');
            const sortedTags = Object.keys(tagCount).sort();
            if (sortedTags.length > 0) {
                tagContainer.innerHTML = sortedTags.map(tag => `
                    <div class="filter-option">
                        <input type="checkbox" id="tag-${tag.replace(/\s+/g, '-').toLowerCase()}" 
                               value="${tag}" onchange="toggleFilter('tag', '${tag}', this.checked)">
                        <label for="tag-${tag.replace(/\s+/g, '-').toLowerCase()}">${tag}</label>
                        <span class="count">(${tagCount[tag]})</span>
                    </div>
                `).join('');
            } else {
                tagContainer.innerHTML = '<div class="filter-option" style="color: #999;">No tags available</div>';
            }
            
            // 应用从 mainpage 传递的筛选条件
            applyInitialFilters();
        }

        // 切换筛选条件
        function toggleFilter(type, value, checked) {
            const set = type === 'brand' ? selectedBrands : 
                       type === 'collection' ? selectedCollections : selectedTags;
            
            if (checked) {
                set.add(value);
            } else {
                set.delete(value);
            }
            
            applyFilters();
        }

        // 应用筛选
        function applyFilters() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            
            filteredProducts = products.filter(p => {
                // 品牌筛选
                if (selectedBrands.size > 0 && !selectedBrands.has(p.brand)) {
                    return false;
                }
                
                // 集合筛选
                if (selectedCollections.size > 0 && !selectedCollections.has(p.collection || '')) {
                    return false;
                }
                
                // 标签筛选
                if (selectedTags.size > 0 && !selectedTags.has(p.tag || '')) {
                    return false;
                }
                
                // 搜索筛选
                if (searchQuery) {
                    const searchable = `${p.name} ${p.brand} ${p.model || ''}`.toLowerCase();
                    if (!searchable.includes(searchQuery)) {
                        return false;
                    }
                }
                
                return true;
            });
            
            // 应用排序（保持当前排序状态）
            const sortSelect = document.getElementById('sortSelect');
            if (sortSelect.value !== 'default') {
                applySorting();
            }
            
            renderProducts();
        }

        // 应用排序
        function applySorting() {
            const sortBy = document.getElementById('sortSelect').value;
            
            switch (sortBy) {
                case 'name-asc':
                    filteredProducts.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'name-desc':
                    filteredProducts.sort((a, b) => b.name.localeCompare(a.name));
                    break;
                case 'price-asc':
                    filteredProducts.sort((a, b) => a.price - b.price);
                    break;
                case 'price-desc':
                    filteredProducts.sort((a, b) => b.price - a.price);
                    break;
                default:
                    // 默认排序：按添加时间（如果有的话）或名称
                    filteredProducts.sort((a, b) => a.name.localeCompare(b.name));
            }
            
            renderProducts();
        }

        // 渲染产品
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const noProducts = document.getElementById('noProducts');
            const countEl = document.getElementById('productCount');
            
            countEl.textContent = `All Products (${filteredProducts.length})`;
            
            if (filteredProducts.length === 0) {
                grid.style.display = 'none';
                noProducts.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            noProducts.style.display = 'none';
            
            grid.innerHTML = filteredProducts.map(p => `
                <a href="product-detail.html?id=${p._id}" class="product-card">
                    <div class="product-image" style="background-image: url('${p.image || ''}');">
                        ${!p.image ? '<span style="font-size: 3rem;">👟</span>' : ''}
                    </div>
                    <div class="product-info">
                        <div class="product-brand">${escapeHtml(p.brand)}</div>
                        <div class="product-name">${escapeHtml(p.name)}</div>
                        <div class="product-price">MOP $${p.price.toFixed(2)}</div>
                        ${p.tag ? `<div class="product-tag">${escapeHtml(p.tag)}</div>` : ''}
                    </div>
                </a>
            `).join('');
        }

        // 清除所有筛选
        function clearAllFilters() {
            selectedBrands.clear();
            selectedCollections.clear();
            selectedTags.clear();
            
            // 取消所有 checkbox
            document.querySelectorAll('#brandFilters input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('#collectionFilters input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('#tagFilters input[type="checkbox"]').forEach(cb => cb.checked = false);
            
            document.getElementById('searchInput').value = '';
            document.getElementById('sortSelect').value = 'default';
            searchQuery = '';
            
            applyFilters();
        }

        // 应用从 mainpage 传递的初始筛选条件
        function applyInitialFilters() {
            const collection = sessionStorage.getItem('selectedCollection');
            const brand = sessionStorage.getItem('selectedBrand');
            
            if (collection) {
                // 查找对应的 checkbox 并勾选
                const checkbox = document.querySelector(`#collectionFilters input[value="${collection}"]`);
                if (checkbox) {
                    checkbox.checked = true;
                    selectedCollections.add(collection);
                }
                sessionStorage.removeItem('selectedCollection');
            }
            
            if (brand) {
                const checkbox = document.querySelector(`#brandFilters input[value="${brand}"]`);
                if (checkbox) {
                    checkbox.checked = true;
                    selectedBrands.add(brand);
                }
                sessionStorage.removeItem('selectedBrand');
            }
            
            if (collection || brand) {
                applyFilters();
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }

        function updateCartBadge() { 
            const cart = JSON.parse(localStorage.getItem('cart')) || []; 
            const total = cart.reduce((s, i) => s + i.quantity, 0); 
            document.getElementById('cartBadge').textContent = total; 
        }

        // 初始化
        window.addEventListener('load', () => { 
            loadProducts(); 
            updateCartBadge(); 
        });
        
        window.addEventListener('storage', updateCartBadge);
    </script>
</body>
</html>
