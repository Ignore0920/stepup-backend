<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - StepUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #262626;
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Navigation Header */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background-color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 1.125rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            text-decoration: none;
            color: #262626;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #666666;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-right button {
            background: none;
            border: none;
            cursor: pointer;
            color: #262626;
            font-size: 1.25rem;
            transition: color 0.3s;
            position: relative;
        }

        .nav-right button:hover {
            color: #666666;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #262626;
            color: #ffffff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            nav {
                display: none;
            }
        }

        /* Breadcrumb */
        .breadcrumb {
            padding: 1.5rem 0;
            font-size: 0.875rem;
            color: #666666;
            border-bottom: 1px solid #e5e5e5;
        }

        .breadcrumb a {
            color: #262626;
            text-decoration: none;
            transition: color 0.3s;
        }

        .breadcrumb a:hover {
            color: #666666;
        }

        /* Product Section */
        .product-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            padding: 3rem 0;
            align-items: start;
        }

        .product-images {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .main-image {
            width: 100%;
            height: 600px;
            background-color: #f5f5f5;
            border: 1px solid #e5e5e5;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        .thumbnail-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 1;
            background-color: #f5f5f5;
            border: 2px solid #e5e5e5;
            cursor: pointer;
            transition: all 0.3s;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .thumbnail:hover,
        .thumbnail.active {
            border-color: #262626;
        }

        /* Right Column - Product Details */
        .product-details {
            display: flex;
            flex-direction: column;
        }

        .product-brand {
            color: #262626;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .product-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .stars {
            display: flex;
            gap: 0.25rem;
            color: #ffc107;
        }

        .star {
            font-size: 1rem;
        }

        .rating-count {
            color: #666666;
        }

        .product-price {
            font-size: 1.75rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #262626;
        }

        .price-note {
            font-size: 0.875rem;
            color: #666666;
            margin-bottom: 1.5rem;
        }

        .product-description {
            color: #666666;
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .deco-divider {
            width: 60px;
            height: 2px;
            background-color: #262626;
            margin: 2rem 0;
        }

        /* Options */
        .options-section {
            margin-bottom: 2rem;
        }

        .option-group {
            margin-bottom: 1.5rem;
        }

        .option-label {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            display: block;
        }

        .size-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
        }

        .size-btn {
            padding: 0.75rem;
            border: 1px solid #e5e5e5;
            background-color: #ffffff;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .size-btn:hover {
            border-color: #262626;
        }

        .size-btn.active {
            background-color: #262626;
            color: #ffffff;
            border-color: #262626;
        }

        .color-options {
            display: flex;
            gap: 1rem;
        }

        .color-btn {
            width: 50px;
            height: 50px;
            border: 2px solid #e5e5e5;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .color-btn:hover {
            border-color: #262626;
        }

        .color-btn.active {
            border-color: #262626;
        }

        .color-btn.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #262626;
            font-weight: bold;
            font-size: 1.25rem;
        }

        /* Quantity and Actions */
        .purchase-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            border: 1px solid #e5e5e5;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: none;
            background-color: #f5f5f5;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .qty-btn:hover {
            background-color: #e5e5e5;
        }

        .qty-input {
            width: 60px;
            height: 40px;
            border: none;
            border-left: 1px solid #e5e5e5;
            border-right: 1px solid #e5e5e5;
            text-align: center;
            font-size: 0.875rem;
            background-color: #ffffff;
        }

        .qty-input:focus {
            outline: none;
        }

        .add-to-cart-btn {
            flex: 1;
            padding: 1rem;
            background-color: #262626;
            color: #ffffff;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-to-cart-btn:hover {
            opacity: 0.9;
        }

        .wishlist-btn {
            width: 50px;
            height: 50px;
            border: 1px solid #e5e5e5;
            background-color: #ffffff;
            cursor: pointer;
            font-size: 1.25rem;
            transition: all 0.3s;
        }

        .wishlist-btn:hover {
            border-color: #262626;
            background-color: #f5f5f5;
        }

        /* Product Info Tabs */
        .product-info {
            margin-top: 3rem;
            border-top: 1px solid #e5e5e5;
            padding-top: 2rem;
        }

        .info-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e5e5e5;
        }

        .info-tab {
            padding-bottom: 1rem;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s;
        }

        .info-tab:hover {
            color: #666666;
        }

        .info-tab.active {
            border-bottom-color: #262626;
            color: #262626;
        }

        .info-content {
            display: none;
        }

        .info-content.active {
            display: block;
        }

        .info-content ul {
            list-style: none;
            margin-left: 1rem;
        }

        .info-content li {
            margin-bottom: 0.75rem;
            color: #666666;
        }

        .info-content li::before {
            content: '→ ';
            margin-right: 0.5rem;
            color: #262626;
        }

        /* Related Products */
        .related-products {
            margin-top: 4rem;
            padding-top: 3rem;
            border-top: 1px solid #e5e5e5;
        }

        .section-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transform: translateY(-0.5rem);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: transparent;
            margin-bottom: 1rem;
            object-fit: cover;
        }

        .product-tag {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background-color: #262626;
            color: #ffffff;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .product-brand-card {
            color: #262626;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-size: 1.125rem;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .product-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid #e5e5e5;
        }

        .product-price-card {
            color: #262626;
            font-weight: 600;
        }

        /* Footer */
        footer {
            background-color: #f5f5f5;
            border-top: 1px solid #e5e5e5;
            padding: 3rem 0;
            margin-top: 4rem;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3rem;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #e5e5e5;
        }

        .footer-section {
            display: flex;
            flex-direction: column;
        }

        .footer-section-brand {
            display: flex;
            flex-direction: column;
        }

        .footer-section-brand .logo-box {
            width: 32px;
            height: 32px;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .footer-section-brand .brand-name {
            font-weight: bold;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .footer-section-brand p {
            font-size: 0.875rem;
            color: #666666;
            line-height: 1.6;
        }

        .footer-section h4 {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            color: #262626;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 0.75rem;
        }

        .footer-section ul li a {
            color: #666666;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s;
        }

        .footer-section ul li a:hover {
            color: #262626;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: #666666;
        }

        .social-links {
            display: flex;
            gap: 2rem;
        }

        .social-links a {
            color: #666666;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #262626;
        }

        @media (max-width: 1024px) {
            .product-section {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .product-images {
                position: static;
            }

            .main-image {
                height: 500px;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }

            .product-section {
                grid-template-columns: 1fr;
            }

            .main-image {
                height: 400px;
            }

            .purchase-section {
                flex-direction: column;
            }

            .add-to-cart-btn {
                width: 100%;
            }

            .size-options {
                grid-template-columns: repeat(4, 1fr);
            }

            .info-tabs {
                flex-wrap: wrap;
            }

            .footer-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .footer-bottom {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .social-links {
                justify-content: center;
            }
        }

        .reviews-section {
            padding: 4rem 0;
            background-color: #f9f9f9;
            border-top: 1px solid #e5e5e5;
        }

        .review-form-container {
            background-color: #ffffff;
            padding: 2rem;
            margin: 2rem 0;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
        }

        .review-form-title {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            font-family: Montserrat, sans-serif;
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #262626;
            background-color: #f9f9f9;
        }

        .form-group textarea {
            resize: vertical;
        }

        .rating-input {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .rating-input input {
            display: none;
        }

        .rating-input label {
            font-size: 2rem;
            cursor: pointer;
            color: #e5e5e5;
            transition: color 0.3s;
            margin: 0;
        }

        .rating-input input:checked + label,
        .rating-input label:hover {
            color: #262626;
        }

        .submit-review-btn {
            background-color: #262626;
            color: #ffffff;
            padding: 0.875rem 2rem;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .submit-review-btn:hover {
            opacity: 0.9;
        }

        .reviews-list {
            margin-top: 2rem;
        }

        .review-item {
            background-color: #ffffff;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .review-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .review-rating {
            color: #262626;
            font-size: 0.9rem;
        }

        .review-date {
            color: #999999;
            font-size: 0.85rem;
        }

        .review-text {
            color: #666666;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .no-reviews {
            padding: 2rem;
            color: #999999;
        }
    </style>
</head>

    <div class="container">
            <div class="header-content">

                    <div class="logo-box">S</div>

                </div>
                <nav>
                    <a href="mainpage.html">Shop</a>

                </nav>
                <div class="nav-right">
                    <button title="Shopping Cart" onclick="window.location.href='shopping-cart.html'" style="position: relative;">
                        🛒
                        <span class="cart-badge" id="cartBadge">0</span>
                    </button>
                    <a href="account.html" class="user-icon-btn" title="User Account">👤</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="filter-group">
                <h3>Brand</h3>
                <div class="filter-options">
                    <div class="filter-option">
                        <input type="checkbox" id="brand-nike" value="Nike" onchange="applyFilters()">
                        <label for="brand-nike">Nike</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="brand-jordan" value="Jordan" onchange="applyFilters()">
                        <label for="brand-jordan">Jordan</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="brand-adidas" value="Adidas" onchange="applyFilters()">
                        <label for="brand-adidas">Adidas</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="brand-puma" value="Puma" onchange="applyFilters()">
                        <label for="brand-puma">Puma</label>
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <h3>Collection</h3>
                <div class="filter-options">
                    <div class="filter-option">
                        <input type="checkbox" id="collection-running" value="Running" onchange="applyFilters()">
                        <label for="collection-running">Running</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="collection-casual" value="Casual" onchange="applyFilters()">
                        <label for="collection-casual">Casual</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="collection-basketball" value="Basketball" onchange="applyFilters()">
                        <label for="collection-basketball">Basketball</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="collection-training" value="Training" onchange="applyFilters()">
                        <label for="collection-training">Training</label>
                    </div>
                </div>
            </div>
        </aside>

        <main class="products-section">
            <div class="products-header">
                <h2>All Products</h2>
                <select class="sort-dropdown" onchange="applySorting(this.value)">
                    <option value="name-asc">Sort by Name (A-Z)</option>
                    <option value="name-desc">Sort by Name (Z-A)</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                </select>
            </div>

            <div class="products-grid" id="productsGrid">
                <!-- Products will be inserted here by JavaScript -->
            </div>

            <div class="no-products" id="noProducts" style="display: none;">
                <p>No products found. Try adjusting your filters.</p>
            </div>
        </main>
    </div>

                link: 'NikeEliteRunnerPro.html',
                tag: ''
            },

        let filteredProducts = [...products];
        let sortOrder = 'name-asc';

        function applyFilters() {
            const selectedBrands = Array.from(document.querySelectorAll('input[id^="brand-"]:checked')).map(el => el.value);
            const selectedCollections = Array.from(document.querySelectorAll('input[id^="collection-"]:checked')).map(el => el.value);

            filteredProducts = products.filter(product => {
                const brandMatch = selectedBrands.length === 0 || selectedBrands.includes(product.brand);
                const collectionMatch = selectedCollections.length === 0 || selectedCollections.includes(product.collection);
                return brandMatch && collectionMatch;
            });

            applySorting(sortOrder);
            renderProducts();
        }

        function applySorting(order) {
            sortOrder = order;
            
            switch(order) {
                case 'name-asc':
                    filteredProducts.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'name-desc':
                    filteredProducts.sort((a, b) => b.name.localeCompare(a.name));
                    break;
                case 'price-asc':
                    filteredProducts.sort((a, b) => a.price - b.price);
                    break;
                case 'price-desc':
                    filteredProducts.sort((a, b) => b.price - a.price);
                    break;
            }
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const noProducts = document.getElementById('noProducts');

            if (filteredProducts.length === 0) {
                grid.style.display = 'none';
                noProducts.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            noProducts.style.display = 'none';

            grid.innerHTML = filteredProducts.map(product => `
                <a href="${product.link}" class="product-card">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}">
                    </div>
                    <div class="product-info">
                        <div class="product-brand">${product.brand}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">MOP $${product.price.toFixed(2)}</div>
                        ${product.tag ? `<div class="product-tag">${product.tag}</div>` : ''}
                    </div>
                </a>
            `).join('');
        }

        // Initial render
        renderProducts();
    </script>
