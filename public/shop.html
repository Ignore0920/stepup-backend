<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - StepUp</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Copy styles from main page.html */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #262626;
            line-height: 1.6;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Add navigation and footer styles from main page */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background-color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 1.125rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            text-decoration: none;
            color: #262626;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #666666;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-right button {
            background: none;
            border: none;
            cursor: pointer;
            color: #262626;
            font-size: 1.25rem;
            transition: color 0.3s;
            position: relative;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #262626;
            color: #ffffff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .page-title {
            padding: 2rem 0;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 2rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transform: translateY(-0.5rem);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: #e5e5e5;
            margin-bottom: 1rem;
            object-fit: cover;
        }

        .product-brand {
            color: #262626;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-size: 1.125rem;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .product-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid #e5e5e5;
        }

        .product-price {
            color: #262626;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo" onclick="window.location.href='main page.html'">
                    <div class="logo-box">S</div>
                    <div class="logo-text">STEPUP</div>
                </div>
                <nav>
                    <a href="mainpage.html">Home</a>
                    <a href="shop.html" style="font-weight: 700; border-bottom: 2px solid #262626;">Shop</a>
                    <a href="about.html">About</a>
                </nav>
                <div class="nav-right">
                    <button title="Shopping Cart" onclick="window.location.href='shopping-cart.html'" style="position: relative;">
                        🛒
                        <span class="cart-badge" id="cartBadge">0</span>
                    </button>
                    <a href="account.html" class="user-icon-btn" title="User Account">👤</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="page-title">
            <h1>Shop All Products</h1>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>
    </div>

    <script>
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cartBadge');
            if (badge) {
                badge.textContent = totalItems;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
            
            // Load sample products
            const products = [
                { brand: 'Nike', name: 'Air Max 270', price: 'MOP $189.99', image: 'https://files.manuscdn.com/user_upload_by_module/session_file/310519663381436063/lOZOEbUZRBkODyvf.png' },
                { brand: 'Adidas', name: 'Ultraboost', price: 'MOP $179.99' },
                { brand: 'Jordan', name: 'Air Jordan 1', price: 'MOP $199.99' },
                { brand: 'Puma', name: 'RS-X', price: 'MOP $129.99' },
                { brand: 'New Balance', name: '990v5', price: 'MOP $184.99' },
                { brand: 'Converse', name: 'Chuck 70', price: 'MOP $89.99' }
            ];
            
            const grid = document.getElementById('productsGrid');
            let html = '';
            
            products.forEach(product => {
                html += `
                    <div class="product-card" onclick="window.location.href='product-detail.html'">
                        <div class="product-image" style="background-image: url('${product.image || ''}'); background-size: contain; background-repeat: no-repeat; background-position: center;"></div>
                        <p class="product-brand">${product.brand}</p>
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-footer">
                            <span class="product-price">${product.price}</span>
                            <span style="cursor: pointer; font-size: 1.25rem;">→</span>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        });
    </script>
</body>
</html>
